<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 전설의 초등 회화 150패턴 - 청크 마스터</title>
<style>
  :root{
    --green:#38a169;--green-l:#c6f6d5;--green-ll:#f0fff4;
    --blue:#4A90D9;--blue-l:#bee3f8;--blue-ll:#ebf8ff;
    --orange:#E8763A;--orange-l:#fbd38d;--orange-ll:#fffbeb;
    --teal:#319795;--teal-l:#b2f5ea;--teal-ll:#e6fffa;
    --grad:linear-gradient(135deg,#11998e,#38ef7d);
    --grad2:linear-gradient(135deg,#4facfe,#00f2fe);
    --bg:#f8f9fa;--card:#fff;--border:#e2e8f0;--radius:12px;--shadow:0 2px 8px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:#2d3748;line-height:1.6;padding-bottom:60px}

  header{background:var(--grad);color:#fff;padding:28px 20px 20px;text-align:center}
  header h1{font-size:1.7rem;margin-bottom:6px}
  header p{font-size:.9rem;opacity:.9}
  .header-badges{display:flex;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap}
  .badge{background:rgba(255,255,255,.22);border-radius:20px;padding:4px 14px;font-size:.8rem;font-weight:600}

  .ctrl-bar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .ctrl-bar input{flex:1;min-width:160px;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;outline:none}
  .ctrl-bar input:focus{border-color:#11998e}
  .cbtn{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:700}
  .cbtn.expand{background:#11998e;color:#fff}.cbtn.collapse{background:#e2e8f0;color:#4a5568}
  .speed-wrap{display:flex;align-items:center;gap:4px;font-size:.74rem;font-weight:700;color:#276749;white-space:nowrap}
  .speed-btn{padding:2px 8px;border:1.5px solid var(--green-l);border-radius:5px;font-size:.7rem;cursor:pointer;font-weight:700;background:#fff;color:#4a5568;transition:all .15s}
  .speed-btn.spd-active{background:#11998e;color:#fff;border-color:#11998e}

  .toc-wrap{max-width:1100px;margin:18px auto;padding:0 16px}
  .toc-details summary{cursor:pointer;font-weight:700;color:#11998e;padding:10px 14px;background:#fff;border-radius:var(--radius);border:1.5px solid var(--teal-l);list-style:none}
  .toc-details summary::-webkit-details-marker{display:none}
  .toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;padding:10px 0}
  .toc-item{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff;border-radius:8px;border:1px solid var(--border);text-decoration:none;color:#2d3748;font-size:.82rem;transition:all .15s}
  .toc-item:hover{border-color:#11998e;background:var(--teal-ll);transform:translateY(-1px)}
  .toc-num{font-weight:700;color:#11998e;font-size:.76rem;min-width:28px}

  .star-row{display:flex;align-items:center;gap:4px;font-size:.75rem}
  .star-num{font-size:.7rem;background:#e2e8f0;color:#718096;border-radius:8px;padding:1px 6px;font-weight:700}

  main{max-width:920px;margin:0 auto;padding:0 16px}

  .pat-wrap{margin-bottom:12px}
  .pat-details{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden}
  .pat-details[open]{border-color:#a0aec0}
  .pat-summary{cursor:pointer;display:flex;align-items:center;gap:10px;padding:13px 16px;list-style:none;user-select:none;background:linear-gradient(90deg,#f0fff4,#fff);transition:background .2s}
  .pat-summary::-webkit-details-marker{display:none}
  .pat-details[open] .pat-summary{background:linear-gradient(90deg,var(--teal-ll),#f7ffff)}
  .pat-summary:hover{background:var(--teal-ll)}
  .pat-num{background:var(--grad);color:#fff;border-radius:7px;padding:3px 9px;font-size:.75rem;font-weight:700;white-space:nowrap}
  .pat-en{font-size:.98rem;font-weight:700;flex:1;color:#2d3748}
  .pat-ko{font-size:.82rem;color:#718096}
  .pat-body{padding:12px 16px 16px;border-top:1px solid var(--border)}

  .chunk-box{background:var(--teal-ll);border-radius:8px;padding:10px 14px;margin-bottom:10px;border-left:3px solid #319795}
  .chunk-en{font-size:.92rem;font-weight:700;color:#2d3748;margin-bottom:3px}
  .chunk-ko{font-size:.85rem;color:#4a5568}
  .chunk-point{font-size:.8rem;color:#11998e;margin-top:5px}
  .chunk-usage{font-size:.78rem;color:#718096;margin-top:3px;font-style:italic}

  .dial-header{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:10px 0 6px}
  .dial-title{font-size:.85rem;font-weight:700;color:#276749;flex:1}
  .btn-play-all{padding:5px 12px;border:none;border-radius:6px;font-size:.76rem;cursor:pointer;font-weight:700;background:linear-gradient(135deg,#11998e,#38a169);color:#fff;transition:all .2s;box-shadow:0 2px 5px rgba(17,153,142,.3)}
  .btn-play-all:hover{transform:translateY(-1px)}
  .btn-play-all.playing-state{background:linear-gradient(135deg,#e53e3e,#c53030);animation:pulse .9s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}

  .play-ctrl{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:7px 12px;background:var(--green-ll);border:1px solid var(--green-l);border-radius:9px;margin-bottom:8px}
  .interval-wrap{display:flex;align-items:center;gap:5px;font-size:.74rem;color:#276749;font-weight:700;white-space:nowrap}
  .interval-slider{-webkit-appearance:none;appearance:none;width:90px;height:4px;border-radius:3px;background:var(--green-l);outline:none;cursor:pointer}
  .interval-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#11998e;cursor:pointer}
  .interval-val{min-width:26px;text-align:center;font-size:.76rem;font-weight:700;color:#276749;background:var(--green-l);border-radius:4px;padding:1px 4px}
  .play-prog{font-size:.73rem;font-weight:700;color:#718096;background:#edf2f7;border-radius:10px;padding:2px 9px;white-space:nowrap;margin-left:auto}
  .play-prog.active{color:#276749;background:var(--green-l)}

  .dial-line{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:7px;margin-bottom:5px;border:1.5px solid transparent;transition:all .2s}
  .dial-line.sp-A{background:var(--blue-ll);border-color:var(--blue-l)}
  .dial-line.sp-B{background:var(--orange-ll);border-color:var(--orange-l)}
  .dial-line.speaking{transform:scale(1.01);box-shadow:0 0 0 2px rgba(17,153,142,.5)}
  .spk-badge{font-size:.7rem;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;min-width:30px;text-align:center}
  .sp-A .spk-badge{background:var(--blue);color:#fff}
  .sp-B .spk-badge{background:var(--orange);color:#fff}
  .line-text{flex:1}
  .line-en{font-size:.88rem;font-weight:600;color:#2d3748}
  .line-ko{font-size:.8rem;color:#718096;margin-top:2px}
  .btn-speak-one{flex-shrink:0;background:#fff;border:1.5px solid var(--blue-l);border-radius:5px;padding:2px 8px;font-size:.68rem;cursor:pointer;color:#2b6cb0;font-weight:700;transition:all .15s}
  .btn-speak-one:hover{background:var(--blue-ll)}
  .btn-speak-one.speaking-one{background:var(--blue-l);animation:pulse .9s infinite}
  .sp-B .btn-speak-one{border-color:var(--orange-l);color:#c05621}
  .sp-B .btn-speak-one.speaking-one{background:var(--orange-l)}

  .prac-details{margin-top:10px;border:1.5px solid var(--teal-l);border-radius:8px;overflow:hidden}
  .prac-details summary{cursor:pointer;background:var(--teal-ll);padding:7px 12px;font-size:.82rem;font-weight:700;color:#276749;list-style:none}
  .prac-details summary::-webkit-details-marker{display:none}
  .prac-list{padding:10px 14px;background:#fff;border-top:1px solid var(--teal-l)}
  .prac-list li{font-size:.82rem;margin-bottom:6px;padding-left:8px;border-left:3px solid #68d391;list-style:none;line-height:1.5}

  .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;padding:10px 16px;max-width:920px;margin:12px auto 0;font-size:.8rem;color:#718096}
  .ldot{width:11px;height:11px;border-radius:2px;display:inline-block;margin-right:3px}
  .hidden{display:none!important}

  @media(max-width:600px){header h1{font-size:1.3rem}.pat-en{font-size:.88rem}}
</style>
</head>
<body>
<header>
  <h1>📚 전설의 초등 회화 150패턴</h1>
  <p>청크(의미단위) 마스터 · 어순 중심 직독직해 · 상황별 실전 대화</p>
  <div class="header-badges">
    <span class="badge">📦 150패턴</span>
    <span class="badge">🗣️ 전체 듣기</span>
    <span class="badge">🔊 한문장 듣기</span>
    <span class="badge">📖 청크 분해</span>
    <span class="badge">💬 실전 대화</span>
    <span class="badge">⭐ 활용도 표시</span>
  </div>
</header>

<div class="ctrl-bar">
  <input type="text" id="searchBox" placeholder="🔍 패턴 검색 (영어/한국어)..." oninput="filterPatterns()">
  <button class="cbtn expand" onclick="expandAll()">전체 펼치기</button>
  <button class="cbtn collapse" onclick="collapseAll()">전체 접기</button>
  <div class="speed-wrap" style="margin-left:auto">
    속도:
    <button class="speed-btn" onclick="setGlobalSpeed(0.75,this)">0.75x</button>
    <button class="speed-btn spd-active" onclick="setGlobalSpeed(1,this)">1x</button>
    <button class="speed-btn" onclick="setGlobalSpeed(1.25,this)">1.25x</button>
  </div>
</div>

<div class="legend">
  <span><span class="ldot" style="background:var(--blue-l)"></span>화자 A</span>
  <span><span class="ldot" style="background:var(--orange-l)"></span>화자 B</span>
  <span>⭐ 활용도 5단계</span>
  <span>🔊 한문장씩 듣기 가능</span>
</div>

<div class="toc-wrap">
  <details class="toc-details" id="tocPanel">
    <summary>📋 전체 목차 보기 (클릭해서 열기)</summary>
    <div class="toc-grid" id="tocGrid"></div>
  </details>
</div>

<main id="mainArea"></main>

<script>
const PATTERNS = [
  // === Part 1: 인사와 자기소개 001-020 ===
  {no:"001",cat:"👋 인사와 자기소개",en:"Hi there! How's it going?",ko:"안녕! 어떻게 지내?",star:5,
   chunk:"Hi there! / How's it / going?",chunkKo:"안녕! / 어떻게 / 지내?",

   dial:[{s:"A",en:"Hi there! How's it going?",ko:"안녕! 어떻게 지내?"},{s:"B",en:"Hey! Pretty good! How about you?",ko:"야! 꽤 좋아! 너는?"},{s:"A",en:"I'm doing great! Want to play basketball after school?",ko:"나 아주 잘 지내! 방과 후에 농구 할래?"},{s:"B",en:"Sure! That sounds fun!",ko:"물론이지! 재미있을 것 같아!"}],
   prac:["아침에 친구에게: Hi there! How's it going today?","점심시간에: Hey! How's it going? Let's eat together!","주말에 만났을 때: Hi! How's it going? What did you do this weekend?"]},
  {no:"002",cat:"👋 인사와 자기소개",en:"Hey! What's up, dude?",ko:"야! 뭐해, 친구?",star:5,
   chunk:"Hey! / What's up, / dude?",chunkKo:"야! / 별일 없어, / 친구야?",
   point:"Hey! (호출) → What's up, (무슨 일) → dude? (친구)",

   dial:[{s:"A",en:"Hey! What's up, dude?",ko:"야! 뭐해, 친구?"},{s:"B",en:"Not much! Just finished math class. You?",ko:"별일 없어! 방금 수학 수업 끝났어. 너는?"},{s:"A",en:"Same! The test was so hard. What's up after school?",ko:"나도! 시험 너무 어려웠어. 방과 후에 뭐 해?"},{s:"B",en:"Nothing planned! Want to play basketball?",ko:"계획 없어! 농구 할래?"}],

  {no:"004",cat:"👋 인사와 자기소개",en:"Long time no see!",ko:"오랜만이야!",star:3,
   chunk:"Long time / no see! / Where have you been?",chunkKo:"오랜 시간 동안 / 보지 못했네! / 너 어디 있었어?",
   point:"Long time (오랜 시간) → no see! (못 봤네)",

   dial:[{s:"A",en:"Long time no see! Where have you been?",ko:"오랜만이야! 어디 있었어?"},{s:"B",en:"I moved to a different school last year!",ko:"작년에 다른 학교로 이사 갔어!"},{s:"A",en:"Oh wow! I missed you so much!",ko:"오 와! 너무 보고 싶었어!"},{s:"B",en:"Me too! Let's catch up!",ko:"나도! 이야기 많이 하자!"}],
   prac:["이사 간 친구: Long time no see! Miss you!","방학 후: Long time no see! How was vacation?","옛날 친구: Wow! Long time no see!"]},
  {no:"005",cat:"👋 인사와 자기소개",en:"How's it going?",ko:"어떻게 지내?",star:5,

   dial:[{s:"A",en:"Hey! How's it going?",ko:"야! 어떻게 지내?"},{s:"B",en:"Pretty good! Just finished homework. You?",ko:"꽤 좋아! 방금 숙제 끝냈어. 너는?"},{s:"A",en:"Same! Want to go to the park?",ko:"나도! 공원 갈래?"},{s:"B",en:"Yes! Let's go!",ko:"응! 가자!"}],

let globalSpeed = 1;
let currentUtterance = null;
let playingAll = null;

function stars(n){ return '⭐'.repeat(n); }

function buildTOC(){
  const grid = document.getElementById('tocGrid');
  const cats = {};
  PATTERNS.forEach(p=>{ if(!cats[p.cat])cats[p.cat]=[]; cats[p.cat].push(p); });
  Object.keys(cats).forEach(cat=>{
    const label = document.createElement('div');
    label.style.cssText='grid-column:1/-1;font-weight:700;font-size:.8rem;color:#11998e;padding:4px 2px;margin-top:6px;border-bottom:1px solid var(--teal-l);';
    label.textContent=cat; grid.appendChild(label);
    cats[cat].forEach(p=>{
      const a=document.createElement('a');
      a.className='toc-item'; a.href='#pat-'+p.no;
      a.innerHTML=`<span class="toc-num">${p.no}</span><span>${p.en}</span>`;
      grid.appendChild(a);
    });
  });
}

function buildPatterns(){
  const main = document.getElementById('mainArea');
  let lastCat = '';
  PATTERNS.forEach(p=>{
    if(p.cat !== lastCat){
      const hdr=document.createElement('h2');
      hdr.style.cssText='font-size:1rem;color:#11998e;padding:16px 4px 6px;border-bottom:2px solid var(--teal-l);margin-bottom:10px';
      hdr.textContent=p.cat; main.appendChild(hdr); lastCat=p.cat;
    }
    const wrap=document.createElement('div');
    wrap.className='pat-wrap'; wrap.id='pat-'+p.no;
    wrap.dataset.en=p.en.toLowerCase(); wrap.dataset.ko=p.ko;
    wrap.innerHTML=makePatternHTML(p);
    main.appendChild(wrap);
  });
}

function makePatternHTML(p){
  const dialLines = p.dial.map((d,i)=>`
    <div class="dial-line sp-${d.s}" id="dl-${p.no}-${i}">
      <span class="spk-badge">${d.s}</span>
      <div class="line-text">
        <div class="line-en">${d.en}</div>
        <div class="line-ko">${d.ko}</div>
      </div>
      <button class="btn-speak-one" onclick="speakOne(this,'${escQ(d.en)}')">🔊 듣기</button>
    </div>`).join('');

  const pracItems = p.prac.map(pr=>`<li>${pr}</li>`).join('');

  return `
  <details class="pat-details">
    <summary class="pat-summary">
      <span class="pat-num">${p.no}</span>
      <div style="flex:1">
        <div class="pat-en">${p.en}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:2px">
          <span class="pat-ko">${p.ko}</span>
          <span style="font-size:.7rem;color:#f6ad55">${stars(p.star)}</span>
        </div>
      </div>
    </summary>
    <div class="pat-body">
      <div class="chunk-box">
        <div style="font-size:.75rem;font-weight:700;color:#11998e;margin-bottom:4px">📦 청크 분해</div>
        <div class="chunk-en">${p.chunk}</div>
        <div class="chunk-ko">${p.chunkKo}</div>
        <div class="chunk-point">💡 ${p.point}</div>
        ${p.usage?`<div class="chunk-usage">📌 활용: ${p.usage}</div>`:''}
      </div>
      <div class="dial-header">
        <span class="dial-title">💬 실전 대화</span>
        <button class="btn-play-all" onclick="playAll(this,'${p.no}')">▶ 전체 듣기</button>
      </div>
      <div class="play-ctrl">
        <div class="interval-wrap">
          <label>간격</label>
          <input type="range" class="interval-slider" min="0.5" max="3" step="0.5" value="1.5" oninput="this.nextElementSibling.textContent=this.value+'s'">
          <span class="interval-val">1.5s</span>
        </div>
        <div style="width:1px;height:18px;background:var(--green-l)"></div>
        <div class="speed-wrap">
          속도:
          <button class="speed-btn ${globalSpeed===0.75?'spd-active':''}" onclick="setSpeed(this,.75)">0.75x</button>
          <button class="speed-btn ${globalSpeed===1?'spd-active':''}" onclick="setSpeed(this,1)">1x</button>
          <button class="speed-btn ${globalSpeed===1.25?'spd-active':''}" onclick="setSpeed(this,1.25)">1.25x</button>
        </div>
        <span class="play-prog" id="prog-${p.no}">0 / ${p.dial.length}</span>
      </div>
      ${dialLines}
      <details class="prac-details">
        <summary>🎯 응용 연습 (클릭해서 열기)</summary>
        <ul class="prac-list">${pracItems}</ul>
      </details>
    </div>
  </details>`;
}

function escQ(s){ return s.replace(/'/g,"\\'"); }

function speakOne(btn, text){
  if(currentUtterance){ speechSynthesis.cancel(); currentUtterance=null; }
  btn.classList.add('speaking-one'); btn.textContent='⏸ 정지';
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=globalSpeed;
  u.onend=()=>{ btn.classList.remove('speaking-one'); btn.textContent='🔊 듣기'; currentUtterance=null; };
  u.onerror=()=>{ btn.classList.remove('speaking-one'); btn.textContent='🔊 듣기'; currentUtterance=null; };
  currentUtterance=u; speechSynthesis.speak(u);
}

function playAll(btn, patNo){
  if(btn.classList.contains('playing-state')){
    speechSynthesis.cancel();
    if(playingAll) clearTimeout(playingAll);
    btn.classList.remove('playing-state'); btn.textContent='▶ 전체 듣기';
    document.querySelectorAll(`#pat-${patNo} .dial-line`).forEach(l=>l.classList.remove('speaking'));
    document.getElementById('prog-'+patNo).classList.remove('active');
    return;
  }
  const wrap=document.getElementById('pat-'+patNo);
  if(!wrap.querySelector('.pat-details[open]')) wrap.querySelector('.pat-details').setAttribute('open','');
  const lines=wrap.querySelectorAll('.dial-line');
  const prog=document.getElementById('prog-'+patNo);
  const slider=wrap.querySelector('.interval-slider');
  const interval=parseFloat(slider?slider.value:1.5)*1000;
  btn.classList.add('playing-state'); btn.textContent='⏹ 정지';
  let idx=0;
  const speakNext=()=>{
    if(idx>=lines.length){
      btn.classList.remove('playing-state'); btn.textContent='▶ 전체 듣기';
      lines.forEach(l=>l.classList.remove('speaking')); prog.classList.remove('active'); return;
    }
    lines.forEach(l=>l.classList.remove('speaking'));
    lines[idx].classList.add('speaking');
    prog.textContent=`${idx+1} / ${lines.length}`; prog.classList.add('active');
    lines[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
    const txt=lines[idx].querySelector('.line-en').textContent;
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='en-US'; u.rate=globalSpeed;
    u.onend=()=>{ idx++; playingAll=setTimeout(speakNext, interval); };
    u.onerror=()=>{ idx++; playingAll=setTimeout(speakNext, interval); };
    speechSynthesis.speak(u);
  };
  speakNext();
}

function setSpeed(btn, spd){
  globalSpeed=spd;
  btn.closest('.play-ctrl').querySelectorAll('.speed-btn').forEach(b=>b.classList.remove('spd-active'));
  btn.classList.add('spd-active');
}
function setGlobalSpeed(spd, btn){
  globalSpeed=spd;
  document.querySelectorAll('.ctrl-bar .speed-btn').forEach(b=>b.classList.remove('spd-active'));
  btn.classList.add('spd-active');
}
function expandAll(){ document.querySelectorAll('.pat-details').forEach(d=>d.setAttribute('open','')); }
function collapseAll(){ document.querySelectorAll('.pat-details').forEach(d=>d.removeAttribute('open')); }
function filterPatterns(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.pat-wrap').forEach(w=>{
    const match=!q||w.dataset.en.includes(q)||w.dataset.ko.includes(q)||w.id.includes(q);
    w.classList.toggle('hidden',!match);
  });
}

buildTOC();
buildPatterns();
</script>
