<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌈 파닉스 영어 2310문장 | 유아용 상황별 영어 학습</title>
  <!-- Twemoji: 고품질 SVG 이모지 일러스트 -->
  <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --radius: 16px;
      --shadow: 0 4px 18px rgba(0,0,0,0.10);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
      --transition: 0.25s ease;
    }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #e8f4fd 0%, #fce4ec 50%, #f3e5f5 100%);
      min-height: 100vh;
      padding: 16px;
    }

    /* ====== HEADER ====== */
    .header {
      text-align: center;
      padding: 28px 20px 24px;
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .header h1 { font-size: 2.2em; color: #2c3e50; letter-spacing: -0.5px; }
    .header p { color: #7f8c8d; font-size: 1em; margin-top: 6px; }
    .header-meta {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      margin-top: 14px;
    }
    .meta-badge {
      padding: 4px 14px; border-radius: 20px;
      font-size: 0.82em; font-weight: 700;
      background: #e8f5e9; color: #2e7d32;
    }
    .meta-badge.blue { background: #e3f2fd; color: #1565c0; }
    .meta-badge.purple { background: #f3e5f5; color: #6a1b9a; }

    /* ====== PROGRESS BAR ====== */
    .progress-wrap {
      margin-top: 14px;
      background: #ecf0f1;
      border-radius: 10px; height: 10px; overflow: hidden;
      max-width: 500px; margin-left: auto; margin-right: auto;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #81C784);
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s ease;
    }
    #progressText { margin-top: 6px; font-size: 0.88em; color: #95a5a6; }

    /* ====== SETTINGS PANEL ====== */
    .settings-panel {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .settings-header {
      padding: 15px 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      user-select: none;
      transition: opacity var(--transition);
    }
    .settings-header:hover { opacity: 0.92; }
    .settings-header-title { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1em; }
    .settings-body {
      padding: 22px 24px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px 32px;
      align-items: end;
    }
    .setting-item label {
      display: block; font-size: 0.85em; font-weight: 700;
      color: #555; margin-bottom: 8px;
    }
    .setting-item select {
      width: 100%; padding: 9px 12px;
      border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 0.88em; background: #fafafa; cursor: pointer;
      transition: border-color var(--transition);
    }
    .setting-item select:focus { outline: none; border-color: #667eea; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .setting-item { display: flex; flex-direction: column; justify-content: flex-end; }
    .slider-val {
      min-width: 40px; text-align: right; font-size: 0.85em;
      font-weight: 700; color: #667eea;
    }
    input[type="range"] {
      flex: 1; -webkit-appearance: none;
      height: 6px; border-radius: 3px; background: #e0e0e0; cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: #667eea; cursor: pointer;
      box-shadow: 0 2px 6px rgba(102,126,234,0.4);
    }

    /* ====== GLOBAL CONTROLS ====== */
    .global-controls {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 18px 22px;
      margin-bottom: 14px;
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    }
    .ctrl-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .ctrl-label { font-size: 0.88em; font-weight: 700; color: #555; }

    .btn {
      padding: 10px 20px; border: none; border-radius: 25px;
      cursor: pointer; font-size: 0.92em; font-weight: 700;
      transition: all var(--transition); display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-green  { background: #4CAF50; color: white; }
    .btn-orange { background: #FF9800; color: white; }
    .btn-red    { background: #ef5350; color: white; }
    .btn-purple { background: #7E57C2; color: white; }
    .btn-gray   { background: #78909C; color: white; }
    .btn-indigo { background: #5C6BC0; color: white; }
    .btn-teal   { background: #26A69A; color: white; }
    .btn-sm { padding: 7px 14px; font-size: 0.83em; }

    /* Toggle Switch */
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle-switch { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
    .toggle-switch input { display: none; }
    .toggle-slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 13px; transition: 0.3s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 22px; height: 22px; left: 2px; top: 2px;
      background: white; border-radius: 50%; transition: 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle-switch input:checked + .toggle-slider { background: #4CAF50; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(22px); }

    .separator { width: 1px; height: 32px; background: #e0e0e0; }

    /* ====== SITUATION SECTIONS ====== */
    .situation-section {
      background: white;
      border-radius: var(--radius);
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .situation-header {
      padding: 16px 22px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      user-select: none;
      transition: opacity var(--transition);
    }
    .situation-header:hover { opacity: 0.93; }
    .sit-title-group { display: flex; align-items: center; gap: 14px; }
    .sit-emoji { font-size: 2em; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
    .sit-name { font-size: 1.2em; font-weight: 800; color: #2c3e50; text-shadow: none; }
    .sit-name-en { font-size: 0.82em; color: #5d6d7e; margin-top: 2px; }
    .sit-right { display: flex; align-items: center; gap: 12px; }
    .sit-count {
      background: rgba(255,255,255,0.65); color: #2c3e50;
      padding: 3px 12px; border-radius: 20px;
      font-size: 0.85em; font-weight: 700;
    }
    .chevron { color: #2c3e50; font-size: 1.1em; transition: transform 0.3s; }
    .situation-section.open .chevron { transform: rotate(180deg); }

    .situation-body {
      display: none;
      padding: 18px;
      background: #f8fafc;
    }
    .situation-section.open .situation-body { display: block; }

    .sit-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }

    /* ====== SENTENCE CARDS GRID ====== */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .sentence-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border-left: 5px solid #ccc;
      transition: all 0.3s;
      position: relative;
    }

    @keyframes pulseGlow {
      0%   { box-shadow: 0 0 0 0 rgba(76,175,80,0.45); }
      60%  { box-shadow: 0 0 0 10px rgba(76,175,80,0); }
      100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
    }
    .sentence-card.playing {
      transform: scale(1.015);
      outline: 2px solid #4CAF50;
      animation: pulseGlow 1.4s infinite;
    }

    .card-top {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .card-num {
      background: #f0f2f5; color: #888;
      padding: 2px 10px; border-radius: 20px;
      font-size: 0.75em; font-weight: 800;
    }
    .card-play-btn {
      width: 38px; height: 38px; border-radius: 50%; border: none;
      cursor: pointer; font-size: 1em; display: flex;
      align-items: center; justify-content: center;
      color: white; transition: all 0.2s;
      flex-shrink: 0;
    }
    .card-play-btn:hover { transform: scale(1.12); }

    .card-english {
      font-size: 1.35em; font-weight: 800; color: #2c3e50;
      margin-bottom: 8px; line-height: 1.4;
    }

    .phonics-badge {
      display: inline-block;
      background: #e8f5e9; color: #2e7d32;
      font-size: 0.72em; font-weight: 700;
      padding: 2px 10px; border-radius: 10px;
      margin-bottom: 10px;
    }

    /* Chunks */
    .chunks-box {
      display: none;
      flex-wrap: wrap; gap: 7px;
      padding: 10px 12px;
      background: #f8f9fa; border-radius: 10px;
      margin-bottom: 12px;
      border: 1px dashed #dee2e6;
    }
    .chunks-box.visible { display: flex; }
    .chunk-pill {
      padding: 5px 13px; border-radius: 20px;
      font-size: 0.92em; font-weight: 700; color: white;
      letter-spacing: 0.3px;
    }

    /* QA */
    .card-qa { border-top: 1px solid #f0f0f0; padding-top: 10px; }
    .card-q {
      font-size: 0.82em; color: #1565c0; font-weight: 700;
      margin-bottom: 5px; display: flex; gap: 6px; align-items: flex-start;
    }
    .card-q-icon { flex-shrink: 0; }
    .card-a {
      font-size: 0.85em; color: #34495e; line-height: 1.55;
      display: flex; gap: 6px; align-items: flex-start;
    }
    .card-a-icon { flex-shrink: 0; }
    .phonics-tip {
      margin-top: 7px;
      font-size: 0.75em; color: #9b59b6; font-style: italic;
      display: flex; gap: 5px; align-items: flex-start;
    }

    /* ====== FLOATING MINI PLAYER ====== */
    #miniPlayer {
      position: fixed; bottom: 20px; right: 20px;
      border-radius: 16px;
      padding: 13px 16px 11px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: none; z-index: 999;
      min-width: 230px; max-width: 300px;
      /* 전체 border + left 강조 동시 적용 */
      border: 2.5px solid #4CAF50;
      border-left-width: 6px;
      background: #fff;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    #miniPlayer.visible { display: block; }

    /* ── 재생 중 ── */
    #miniPlayer.state-playing {
      border-color: #4CAF50;
      background: #fff;
      box-shadow: 0 8px 32px rgba(76,175,80,0.18);
    }
    /* ── 일시정지 ── 전체 주황 점선 테두리로 강조 */
    #miniPlayer.state-paused {
      border-color: #FFA726;
      border-style: dashed;
      border-left-style: solid;
      background: #FFF8E1;
      box-shadow: 0 8px 32px rgba(255,167,38,0.22);
    }

    /* 상태 배지 행 */
    .mini-status-row {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 7px;
    }
    /* 상태 배지 */
    .mini-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 9px; border-radius: 20px;
      font-size: 0.76em; font-weight: 800;
      letter-spacing: 0.4px;
      transition: background 0.25s, color 0.25s;
    }
    #miniPlayer.state-playing  .mini-badge {
      background: #E8F5E9; color: #2E7D32;
    }
    #miniPlayer.state-paused   .mini-badge {
      background: #FFF3E0; color: #E65100;
    }
    /* 파동 점 */
    .mini-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; display: inline-block;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; transform: scale(1.1); }
      50%      { opacity: 0.3; transform: scale(0.6); }
    }
    #miniPlayer.state-playing .mini-dot {
      background: #4CAF50;
      animation: pulse-dot 1s ease-in-out infinite;
    }
    #miniPlayer.state-paused  .mini-dot {
      background: #FFA726; animation: none;
    }

    /* 재생 문장 */
    .mini-text {
      font-size: 1em; font-weight: 700;
      color: #2c3e50; line-height: 1.4;
      min-height: 1.4em;
      transition: color 0.2s;
    }
    #miniPlayer.state-paused .mini-text { color: #999; }

    /* Space 힌트 */
    .mini-hint {
      font-size: 0.70em; color: #ccc;
      margin-top: 4px; text-align: right;
    }
    .mini-controls {
      display: flex; gap: 8px;
      margin-top: 10px; justify-content: flex-end;
    }

    /* ====== SITUATION FILTER BAR ====== */
    #filterSection {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .filter-header {
      padding: 12px 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(135deg, #5c6bc0 0%, #7e57c2 100%);
      color: white;
      user-select: none;
    }
    .filter-header-left { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 0.95em; }
    .filter-header-right { display: flex; align-items: center; gap: 10px; font-size: 0.82em; }
    .filter-count-badge {
      background: rgba(255,255,255,0.28);
      padding: 2px 10px; border-radius: 12px; font-weight: 700;
    }
    .filter-body {
      padding: 14px 16px 12px;
      display: none;
    }
    #filterSection.open .filter-body { display: block; }

    /* 전체/초기화 버튼 행 */
    .filter-top-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; flex-wrap: wrap;
    }
    .btn-filter-all {
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.82em; font-weight: 700;
      border: 2px solid #5c6bc0; background: #5c6bc0; color: white;
      cursor: pointer; transition: all 0.18s;
    }
    .btn-filter-all:hover { opacity: 0.85; }
    .btn-filter-reset {
      padding: 5px 12px; border-radius: 20px;
      font-size: 0.82em; font-weight: 600;
      border: 2px solid #e0e0e0; background: white; color: #888;
      cursor: pointer; transition: all 0.18s;
    }
    .btn-filter-reset:hover { border-color: #bbb; color: #555; }
    .filter-selected-info {
      font-size: 0.80em; color: #7e57c2; font-weight: 600;
      margin-left: auto;
    }

    /* 상황 칩 그리드 */
    .filter-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-height: 180px; overflow-y: auto;
      padding-right: 4px;
    }
    .filter-chips::-webkit-scrollbar { width: 4px; }
    .filter-chips::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

    .sit-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 16px;
      font-size: 0.78em; font-weight: 600;
      border: 2px solid #e0e0e0;
      background: #f9f9f9; color: #555;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .sit-chip:hover { border-color: #7e57c2; color: #5c6bc0; background: #ede7f6; }
    .sit-chip.selected {
      border-color: #7e57c2;
      background: linear-gradient(135deg, #ede7f6, #d1c4e9);
      color: #4527a0;
      font-weight: 700;
    }

    /* 필터 적용 중 상황 섹션 숨김 */
    .situation-section.filter-hidden { display: none !important; }

    /* ====== RESPONSIVE ====== */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.6em; }
      .cards-grid { grid-template-columns: 1fr; }
      .global-controls { flex-direction: column; align-items: flex-start; }
      .settings-body { grid-template-columns: 1fr; }
      .filter-chips { max-height: 140px; }
    }

    /* Chunk color palette */
    .cc-0 { background: #FF6B6B; }
    .cc-1 { background: #4ECDC4; }
    .cc-2 { background: #45B7D1; }
    .cc-3 { background: #96CEB4; color: #2c3e50; }
    .cc-4 { background: #FDCB6E; color: #2c3e50; }
    .cc-5 { background: #A29BFE; }
    .cc-6 { background: #FD79A8; }

    .collapsing { transition: display 0.3s; }

    /* ====== CARD IMAGE AREA ====== */
    .card-image {
      margin: -16px -16px 14px -16px;
      height: 130px;
      border-radius: 12px 12px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* 물결 무늬 배경 장식 */
    .card-image::before {
      content: '';
      position: absolute;
      width: 200%; height: 200%;
      top: -50%; left: -50%;
      background: radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.25) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 70%, rgba(255,255,255,0.15) 0%, transparent 50%);
    }
    .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
    }
    .card-img-emoji {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }
    /* Twemoji SVG 이미지 스타일 */
    .card-img-emoji img.emoji {
      width: 64px !important;
      height: 64px !important;
      margin: 0 4px;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.25));
      animation: floatEmoji 3s ease-in-out infinite;
      vertical-align: middle;
    }
    .card-img-emoji img.emoji:nth-child(2) {
      width: 52px !important; height: 52px !important;
      animation-delay: 0.7s;
    }
    .card-img-emoji img.emoji:nth-child(3) {
      width: 44px !important; height: 44px !important;
      animation-delay: 1.4s;
    }
    /* Twemoji 미로딩 시 폴백 폰트 이모지 */
    .card-img-emoji span.raw-emoji {
      font-size: 3.2em;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.22));
      animation: floatEmoji 3s ease-in-out infinite;
    }
    .card-img-emoji span.raw-emoji:nth-child(2) { font-size: 2.6em; animation-delay: 0.7s; }
    .card-img-emoji span.raw-emoji:nth-child(3) { font-size: 2.1em; animation-delay: 1.4s; }
    @keyframes floatEmoji {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      33%       { transform: translateY(-7px) rotate(-3deg); }
      66%       { transform: translateY(-4px) rotate(2deg); }
    }
    .card-img-num {
      position: absolute;
      top: 9px; left: 11px; z-index: 3;
      background: rgba(255,255,255,0.72);
      color: #444; font-size: 0.72em; font-weight: 800;
      padding: 3px 11px; border-radius: 20px;
      backdrop-filter: blur(4px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    /* ====== QUIZ MODE ====== */
    .quiz-controls {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .btn-quiz { background: #FF6F61; color: white; }
    .btn-quiz.active { background: #D84315; box-shadow: 0 0 0 3px rgba(216,67,21,0.3); }
    .btn-lang { background: #5C6BC0; color: white; }
    .btn-lang.active { background: #283593; box-shadow: 0 0 0 3px rgba(40,53,147,0.3); }

    /* Quiz card styles */
    .card-english.quiz-hidden {
      filter: blur(8px);
      cursor: pointer;
      user-select: none;
      transition: filter 0.3s;
      position: relative;
    }
    .card-english.quiz-hidden:hover { filter: blur(5px); }
    .card-english.quiz-revealed { filter: none !important; }

    .card-answer-text.quiz-hidden {
      filter: blur(8px);
      cursor: pointer;
      user-select: none;
      transition: filter 0.3s;
    }
    .card-answer-text.quiz-hidden:hover { filter: blur(5px); }
    .card-answer-text.quiz-revealed { filter: none !important; }

    .quiz-reveal-btn {
      display: none;
      padding: 6px 16px;
      border: 2px dashed #FF6F61;
      border-radius: 20px;
      background: #FFF3E0;
      color: #E65100;
      font-size: 0.82em;
      font-weight: 700;
      cursor: pointer;
      margin: 6px 0;
      transition: all 0.2s;
    }
    .quiz-reveal-btn:hover {
      background: #FFE0B2;

/* ================================================================
   SPEECH SYNTHESIS
   ================================================================ */
let allVoices = [];
let englishVoices = [];
let selectedVoice = null;
let isPlayingAll = false;
let isPaused = false;
let globalPlayIndex = 0;
let flatSentences = [];
let filteredFlat = [];        /* 필터 적용된 재생 목록 */
let selectedSitIds = new Set(); /* 선택된 상황 ID. 빈 Set = 전체 */
let showChunks = false;
let settingsOpen = true;
let situationPlayIndex = 0;
let sitPlayQueue = [];
let sitPlayActive = false;

// Flatten all sentences for global play
SITUATIONS.forEach(sit => {
  sit.sentences.forEach(s => {
    flatSentences.push({ ...s, sitId: sit.id });
  });
});
filteredFlat = [...flatSentences]; /* 초기값: 전체 */

/* ================================================================
   SITUATION FILTER
   ================================================================ */
function initFilterChips() {
  const container = document.getElementById('filterChips');
  if (!container) return;
  container.innerHTML = '';
  SITUATIONS.forEach(sit => {
    const chip = document.createElement('button');
    chip.className = 'sit-chip';
    chip.dataset.sitId = sit.id;
    chip.innerHTML = `${sit.emoji} ${sit.name}`;
    chip.addEventListener('click', () => toggleSitChip(sit.id, chip));
    container.appendChild(chip);
  });
  updateFilterBadge();
}

function toggleSitChip(sitId, chipEl) {
  if (selectedSitIds.has(sitId)) {
    selectedSitIds.delete(sitId);
    chipEl.classList.remove('selected');
  } else {
    selectedSitIds.add(sitId);
    chipEl.classList.add('selected');
  }
  applyFilter();
}

function selectAllSituations() {
  /* 전체 선택: 모든 칩 선택 */
  selectedSitIds.clear();
  SITUATIONS.forEach(s => selectedSitIds.add(s.id));
  document.querySelectorAll('.sit-chip').forEach(c => c.classList.add('selected'));
  applyFilter();
}

function resetFilter() {
  /* 전체 해제 → 전체 보기 */
  selectedSitIds.clear();
  document.querySelectorAll('.sit-chip').forEach(c => c.classList.remove('selected'));
  applyFilter();
}

function applyFilter() {
  const isAll = selectedSitIds.size === 0 || selectedSitIds.size === SITUATIONS.length;

  /* 1. 상황 섹션 표시/숨김 */
  document.querySelectorAll('.situation-section').forEach(sec => {
    const id = parseInt(sec.id.replace('sit-', ''));
    if (isAll || selectedSitIds.has(id)) {
      sec.classList.remove('filter-hidden');
    } else {
      sec.classList.add('filter-hidden');
    }
  });

  /* 2. filteredFlat 재구성 (전체 듣기 대상) */
  if (isAll) {
    filteredFlat = [...flatSentences];
  } else {
    filteredFlat = flatSentences.filter(s => selectedSitIds.has(s.sitId));
  }

  updateFilterBadge();
}

function updateFilterBadge() {
  const badge = document.getElementById('filterCountBadge');
  const info  = document.getElementById('filterInfo');
  const isAll = selectedSitIds.size === 0 || selectedSitIds.size === SITUATIONS.length;

  if (badge) {
    badge.textContent = isAll
      ? `전체 ${SITUATIONS.length}개`
      : `${selectedSitIds.size}개 선택`;
  }
  if (info) {
    info.textContent = isAll
      ? `전체 ${flatSentences.length}문장 재생`
      : `${filteredFlat.length}문장 재생 예정`;
    info.style.color = isAll ? '#7e57c2' : '#e65100';
  }

  /* 버튼 텍스트도 업데이트 */
  const btnPlay = document.getElementById('btnPlayAll');
  if (btnPlay) {
    btnPlay.textContent = isAll ? '▶ 전체 듣기' : `▶ 선택 듣기 (${filteredFlat.length})`;
  }
}

function toggleFilterPanel() {
  const sec = document.getElementById('filterSection');
  const chv = document.getElementById('filterChevron');
  sec.classList.toggle('open');
  if (chv) chv.textContent = sec.classList.contains('open') ? '▲' : '▼';
}

/* Voice loading */
function loadVoices() {
  allVoices = window.speechSynthesis.getVoices();
  englishVoices = allVoices.filter(v => v.lang.startsWith('en'));
  if (englishVoices.length === 0) return;

  const sel = document.getElementById('voiceSelect');
  sel.innerHTML = '';
  englishVoices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${v.name} (${v.lang})`;
    sel.appendChild(opt);
  });

  // Prefer child-friendly voices
  const preferred = englishVoices.findIndex(v =>
    /samantha|google us en|zira|karen|alex|en-us/i.test(v.name + v.lang)
  );
  sel.value = preferred >= 0 ? preferred : 0;
  selectedVoice = englishVoices[parseInt(sel.value)];
}

window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

document.getElementById('voiceSelect').addEventListener('change', function() {
  selectedVoice = englishVoices[parseInt(this.value)] || null;
});

/* Sliders */
['rate','pitch','volume'].forEach(id => {
  const slider = document.getElementById(id + 'Slider');
  const valEl  = document.getElementById(id + 'Val');
  slider.addEventListener('input', () => {
    if (id === 'volume') valEl.textContent = Math.round(parseFloat(slider.value) * 100) + '%';
    else valEl.textContent = parseFloat(slider.value).toFixed(2) + (id === 'rate' ? '×' : '');
  });
});

/* Interval slider */
const intervalSlider = document.getElementById('intervalSlider');
const intervalVal    = document.getElementById('intervalVal');
intervalSlider.addEventListener('input', () => {
  const ms = parseInt(intervalSlider.value);
  intervalVal.textContent = (ms / 1000).toFixed(1) + '초';
});
function getInterval() { return parseInt(intervalSlider.value); }

/* Speak helper */
function speak(text, onEnd) {
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang   = 'en-US';
  utt.rate   = parseFloat(document.getElementById('rateSlider').value);
  utt.pitch  = parseFloat(document.getElementById('pitchSlider').value);
  utt.volume = parseFloat(document.getElementById('volumeSlider').value);
  if (selectedVoice) utt.voice = selectedVoice;
  if (onEnd) utt.onend = onEnd;
  window.speechSynthesis.speak(utt);
}

function testVoice() { speak("Hello! Good morning! Let's learn English together! I love you!"); }

/* ================================================================
   PLAY ALL
   ================================================================ */
function playAll() {
  if (isPlayingAll) return;
  if (filteredFlat.length === 0) { alert('선택된 상황이 없어요. 상황 필터에서 상황을 선택해 주세요!'); return; }
  stopSitPlay();
  globalPlayIndex = 0;
  isPlayingAll = true;
  isPaused = false;
  document.getElementById('btnPlayAll').disabled = true;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('miniPlayer').classList.add('visible');
  setMiniState(true);
  playAllNext();
}

function playAllNext() {
  if (!isPlayingAll || globalPlayIndex >= filteredFlat.length) {
    finishPlayAll(); return;
  }
  const s = filteredFlat[globalPlayIndex];
  setHighlight(s.id, true);
  updateProgress(globalPlayIndex + 1, filteredFlat.length);
  document.getElementById('miniText').textContent = s.english;

  // Auto-open section
  openSection(s.sitId);
  // Scroll to card
  setTimeout(() => {
    const card = document.getElementById('card-' + s.id);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 150);

  speak(s.english, () => {
    if (isPaused) return; /* 일시정지 중이면 진행 멈춤 */
    setHighlight(s.id, false);
    globalPlayIndex++;
    if (isPlayingAll) setTimeout(playAllNext, getInterval());
  });
}

function setMiniState(playing) {
  const mp  = document.getElementById('miniPlayer');
  const lbl = document.getElementById('miniStateLabel');
  const mpb = document.getElementById('miniPauseBtn');
  if (playing) {
    mp.classList.remove('state-paused');
    mp.classList.add('state-playing');
    if (lbl) lbl.textContent = '재생중';
    if (mpb) mpb.textContent = '⏸';
  } else {
    mp.classList.remove('state-playing');
    mp.classList.add('state-paused');
    if (lbl) lbl.textContent = '일시정지';
    if (mpb) mpb.textContent = '▶';
  }
}

function togglePause() {
  const btn = document.getElementById('btnPause');

  if (isPaused) {
    /* ── 재개 ── */
    isPaused = false;
    btn.textContent = '⏸ 일시정지';
    setMiniState(true);
    if (isPlayingAll) {
      playAllNext();
    } else if (sitPlayActive) {
      playFromSitQueue();
    }
  } else {
    /* ── 일시정지: isPaused를 먼저 true로 설정해야
          cancel()의 onend 콜백에서 진행이 멈춤 ── */
    isPaused = true;
    window.speechSynthesis.cancel();
    btn.textContent = '▶ 계속';
    setMiniState(false);
  }
}

function stopAll() {
  isPaused = false; /* 먼저 플래그 초기화 → cancel() onend 무시 */
  window.speechSynthesis.cancel();
  isPlayingAll = false; sitPlayActive = false;
  document.querySelectorAll('.sentence-card.playing').forEach(c => c.classList.remove('playing'));
  finishPlayAll();
  document.getElementById('miniPlayer').classList.remove('visible');
  setMiniState(true); /* 다음 재생을 위해 재생 상태로 초기화 */
}

function finishPlayAll() {
  isPlayingAll = false; isPaused = false;
  document.getElementById('btnPlayAll').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnPause').textContent = '⏸ 일시정지';
  document.getElementById('miniPlayer').classList.remove('visible');
  setMiniState(true);
}

/* Play one sentence */
function playSentence(id) {
  window.speechSynthesis.cancel();
  document.querySelectorAll('.sentence-card.playing').forEach(c => c.classList.remove('playing'));
  setHighlight(id, true);
  const s = flatSentences.find(x => x.id === id);
  if (!s) return;
  speak(s.english, () => setHighlight(id, false));
}

/* ================================================================
   PLAY SITUATION
   ================================================================ */
function playSituation(sitId) {
  stopAll();
  const sit = SITUATIONS.find(s => s.id === sitId);
  if (!sit) return;
  sitPlayQueue = sit.sentences;
  sitPlayIndex = 0; sitPlayActive = true;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('miniPlayer').classList.add('visible');
  playFromSitQueue();
}

function playFromSitQueue() {
  if (!sitPlayActive || sitPlayIndex >= sitPlayQueue.length) {
    sitPlayActive = false;
    document.getElementById('btnPause').disabled = true;
    document.getElementById('btnStop').disabled = true;
    document.getElementById('miniPlayer').classList.remove('visible');
    document.querySelectorAll('.sentence-card.playing').forEach(c => c.classList.remove('playing'));
    return;
  }
  const s = sitPlayQueue[sitPlayIndex];
  setHighlight(s.id, true);
  document.getElementById('miniText').textContent = s.english;
  const card = document.getElementById('card-' + s.id);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  speak(s.english, () => {
    if (isPaused) return; /* 일시정지 중이면 진행 멈춤 */
    setHighlight(s.id, false);
    sitPlayIndex++;
    if (sitPlayActive) setTimeout(playFromSitQueue, getInterval());
  });
}

function stopSitPlay() {
  sitPlayActive = false;
  window.speechSynthesis.cancel();
}

function setHighlight(id, on) {
  const card = document.getElementById('card-' + id);
  if (card) {
    if (on) card.classList.add('playing');
    else    card.classList.remove('playing');
  }
}

function updateProgress(cur, total) {
  const pct = (cur / total) * 100;
  document.getElementById('globalProgressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${cur} / ${total} 문장 (총 2310문장)`;
}

const CHUNK_COLORS = ['cc-0','cc-1','cc-2','cc-3','cc-4','cc-5','cc-6'];

function renderCard(s, sit) {
  const chunkPills = s.chunks.map((c, i) =>
    `<span class="chunk-pill ${CHUNK_COLORS[i % CHUNK_COLORS.length]}">${c}</span>`
  ).join('');

  const isKr2En = quizMode === 'kr2en';
  const isEn2Kr = quizMode === 'en2kr';
  const isQuiz = isKr2En || isEn2Kr;
  const quizClass = isQuiz ? 'quiz-active' : '';

  // 이미지 이모지 생성
  const emojis = getCardEmojis(s.english, sit.emoji);
  const emojiSpans = emojis.map(e => `<span>${e}</span>`).join('');

  // kr2en: 한글 보여주고 영어 숨김 / en2kr: 영어 보여주고 한글 숨김
  const engHidden = isKr2En ? 'quiz-hidden' : '';
  const korHidden = isEn2Kr ? 'quiz-hidden' : '';

  return `
  <div class="sentence-card ${quizClass}" id="card-${s.id}" style="border-left-color:${sit.border}">
    <div class="card-image" style="background:${sit.color}">
      <span class="card-img-num">#${s.id}</span>
      <div class="card-img-emoji">${emojiSpans}</div>
      <span class="quiz-result-icon" id="result-${s.id}" style="top:8px;right:10px;position:absolute;z-index:3"></span>
    </div>
    <div class="card-top">
      <span></span>
      <button class="card-play-btn"
        style="background:${sit.border}"
        onclick="playSentence(${s.id})"
        title="이 문장 듣기">🔊</button>
    </div>
    <div class="card-english ${engHidden}" id="eng-${s.id}" onclick="revealQuizItem('eng-${s.id}')">${s.english}</div>
    <span class="phonics-badge">📚 ${s.phonics}</span>
    <div class="chunks-box${showChunks ? ' visible' : ''}">${chunkPills}</div>
    ${isKr2En ? `
    <div class="quiz-input-area">
      <input class="quiz-input" id="input-${s.id}" type="text" placeholder="영어로 입력하세요..."
>
      <div style="margin-top:6px; display:flex; gap:6px; align-items:center;">
        <button class="btn btn-green btn-sm" onclick="checkQuizAnswerById(${s.id})">✔ 확인</button>
        <button class="btn btn-orange btn-sm" onclick="revealQuizItem('eng-${s.id}'); markQuizResult(${s.id}, false)">👁 정답 보기</button>
      </div>
    </div>` : ''}
    ${isEn2Kr ? `
    <div class="quiz-input-area">
      <button class="btn btn-orange btn-sm" onclick="revealQuizItem('ans-${s.id}')">👁 한글 뜻 보기</button>
      <div style="margin-top:6px; display:flex; gap:6px;">
        <button class="quiz-check-btn correct-btn" onclick="markQuizResult(${s.id}, true)">✅ 알았어요</button>

      </div>
    </div>` : ''}
    <div class="card-qa">
      <div class="card-q"><span class="card-q-icon">❓</span><span>${s.question}</span></div>
      <div class="card-a"><span class="card-a-icon">💬</span><span class="card-answer-text ${korHidden}" id="ans-${s.id}" onclick="revealQuizItem('ans-${s.id}')">${s.answer}</span></div>
    </div>

}

function getCardEmojis(english, sitEmoji) {
  const words = english.toLowerCase().replace(/[^a-z0-9\s'-]/g, '').split(/\s+/);
  const found = [];
  for (const word of words) {
    for (const [key, emoji] of EMOJI_MAP) {
      if (word.startsWith(key) && !found.includes(emoji)) {
        found.push(emoji);
        if (found.length >= 3) return found;
      }
    }
  }
  if (found.length === 0) found.push(sitEmoji);
  return found.slice(0, 3);
}

let quizMode = 'off'; // 'off', 'kr2en', 'en2kr'
let quizCorrect = 0;
let quizWrong = 0;
let quizAnswered = new Set();

function setQuizMode(mode) {
  quizMode = mode;
  // Update button states
  document.getElementById('btnKrToEn').classList.toggle('active', mode === 'kr2en');
  document.getElementById('btnEnToKr').classList.toggle('active', mode === 'en2kr');
  document.getElementById('btnQuizOff').classList.toggle('active', mode === 'off');

  // Show/hide score bar
  const scoreBar = document.getElementById('quizScoreBar');
  if (mode === 'off') {
    scoreBar.classList.remove('visible');
  } else {
    scoreBar.classList.add('visible');
    updateQuizScore();
  }

  render();
}

function revealQuizItem(elId) {
  const el = document.getElementById(elId);
  if (el) {
    el.classList.remove('quiz-hidden');
    el.classList.add('quiz-revealed');
  }
}

function revealAllInCard(sentenceId) {
  revealQuizItem('eng-' + sentenceId);
  revealQuizItem('ans-' + sentenceId);
}

function checkQuizAnswerById(sentenceId) {
  const s = flatSentences.find(x => x.id === sentenceId);
  if (!s) return;
  checkQuizAnswer(sentenceId, s.english);
}

function checkQuizAnswer(sentenceId, correctAnswer) {
  if (quizAnswered.has(sentenceId)) return;

  const input = document.getElementById('input-' + sentenceId);
  if (!input) return;

  const userAnswer = input.value.trim().toLowerCase().replace(/[^a-z0-9\s]/g, '');
  const correct = correctAnswer.toLowerCase().replace(/[^a-z0-9\s]/g, '');

  // Simple similarity check
  const isCorrect = userAnswer === correct ||
    levenshteinDistance(userAnswer, correct) <= Math.max(2, Math.floor(correct.length * 0.2));

  if (isCorrect) {
    input.classList.add('input-correct');
    markQuizResult(sentenceId, true);
  } else {
    input.classList.add('input-wrong');
    markQuizResult(sentenceId, false);
    // Reveal correct answer
    revealQuizItem('eng-' + sentenceId);
  }
}

function markQuizResult(sentenceId, correct) {
  if (quizAnswered.has(sentenceId)) return;
  quizAnswered.add(sentenceId);

  const card = document.getElementById('card-' + sentenceId);
  const resultIcon = document.getElementById('result-' + sentenceId);

  if (correct) {
    quizCorrect++;
    if (card) card.classList.add('quiz-correct');
    if (resultIcon) resultIcon.textContent = '✅';
  } else {
    quizWrong++;
    if (card) card.classList.add('quiz-wrong');
    if (resultIcon) resultIcon.textContent = '❌';
  }

  // Reveal everything after marking
  revealAllInCard(sentenceId);
  updateQuizScore();
}

function updateQuizScore() {
  document.getElementById('scoreCorrect').textContent = quizCorrect;
  document.getElementById('scoreWrong').textContent = quizWrong;
  document.getElementById('scoreRemaining').textContent = flatSentences.length - quizAnswered.size;
}

function resetQuizScore() {
  quizCorrect = 0;
  quizWrong = 0;
  quizAnswered.clear();
  updateQuizScore();
  render();
}

// Levenshtein distance for fuzzy matching
function levenshteinDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, () => Array(n + 1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

document.addEventListener('keydown', function(e) {
  const tag = e.target.tagName.toLowerCase();

  /* ── 퀴즈 입력창에서 Enter → 정답 확인 ── */
  if (tag === 'input' && e.target.classList.contains('quiz-input')) {
    if (e.code === 'Enter') {
      e.preventDefault();
      const sentenceId = parseInt(e.target.id.replace('input-', ''));
      if (!isNaN(sentenceId)) checkQuizAnswerById(sentenceId);
    }
    return; // 퀴즈 입력창에서는 다른 단축키 무시
  }

  /* ── 일반 입력 필드에서는 단축키 무시 ── */
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

  /* ── Space: 일시정지 / 재개 토글 ── */
  if (e.code === 'Space') {
    e.preventDefault();
    if (isPlayingAll || sitPlayActive) {
      togglePause();
    }
  }

  /* ── Enter: 전체 듣기 시작 ── */
  if (e.code === 'Enter') {
    e.preventDefault();
    if (!isPlayingAll && !sitPlayActive) {
      playAll();
    }
  }
});

/* ── Twemoji 적용: 이모지 → 고품질 SVG 일러스트 ── */
function applyTwemoji() {
  if (typeof twemoji === 'undefined') return;
  document.querySelectorAll('.card-img-emoji').forEach(el => {
    twemoji.parse(el, {
      folder: 'svg',
      ext: '.svg',
      base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
    });
  });
}

/* setQuizMode에서도 Twemoji 재적용 */
const _origSetQuizMode = setQuizMode;
setQuizMode = function(mode) {
  _origSetQuizMode(mode);
  requestAnimationFrame(() => applyTwemoji());
};

render();
initFilterChips();   /* 상황 필터 칩 초기화 */
requestAnimationFrame(() => applyTwemoji());
</script>
</body>
</html>
