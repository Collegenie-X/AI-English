<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Wings -->
  <ellipse cx="16" cy="26" rx="12" ry="7" fill="rgba(186,225,255,0.85)" stroke="#90CAF9" stroke-width="1.2"/>
  <ellipse cx="48" cy="26" rx="12" ry="7" fill="rgba(186,225,255,0.85)" stroke="#90CAF9" stroke-width="1.2"/>

  <!-- Body -->
  <ellipse cx="32" cy="40" rx="13" ry="16" fill="#FFC107"/>

  <!-- Stripes -->
  <rect x="19.5" y="33" width="25" height="5" rx="2.5" fill="#212121"/>
  <rect x="19.5" y="42" width="25" height="5" rx="2.5" fill="#212121"/>

  <!-- Stinger -->
