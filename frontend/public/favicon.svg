  <!-- Antennae -->
  <line x1="28" y1="11" x2="21" y2="4" stroke="#212121" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="21" cy="4" r="2" fill="#FFC107" stroke="#212121" stroke-width="1.2"/>
  <line x1="36" y1="11" x2="43" y2="4" stroke="#212121" stroke-width="1.8" stroke-linecap="round"/>
  <circle cx="43" cy="4" r="2" fill="#FFC107" stroke="#212121" stroke-width="1.2"/>
