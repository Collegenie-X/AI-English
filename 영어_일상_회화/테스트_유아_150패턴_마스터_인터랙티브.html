<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🧒 유아 150패턴 마스터 테스트</title>
<style>
:root{--F:#D63384;--M:#0d6efd;--g1:#28a745;--y1:#ffc107;--r1:#dc3545;--bg:#f8f9fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#222;}
h1{text-align:center;padding:18px;background:linear-gradient(135deg,#6f42c1,#0d6efd);color:#fff;font-size:1.4em;}
.voice-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:2px solid #dee2e6;}
.voice-bar label{font-size:.82em;font-weight:600;}
.voice-bar select{font-size:.8em;padding:3px 6px;border:1px solid #ccc;border-radius:6px;}
.vdot{display:inline-block;width:10px;height:10px;border-radius:50%;}
.vdot.vF{background:var(--F);}
.vdot.vM{background:var(--M);}
.score-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;padding:10px 16px;background:#fff;border-bottom:1px solid #dee2e6;}
.score-item{font-size:.85em;font-weight:600;}
.s-correct{color:var(--g1);}
.s-wrong{color:var(--r1);}
.s-total{color:#555;}
.reset-btn{margin-left:auto;font-size:.8em;padding:4px 10px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;}
.tabs{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;background:#fff;border-bottom:1px solid #dee2e6;position:sticky;top:0;z-index:10;}
.tab-btn{padding:6px 14px;border:1px solid #dee2e6;border-radius:20px;background:#fff;cursor:pointer;font-size:.82em;font-weight:600;text-align:center;line-height:1.3;}
.tab-btn.active{background:#6f42c1;color:#fff;border-color:#6f42c1;}
.tab-btn.p1{border-color:#28a745;}.tab-btn.p1.active{background:#28a745;}
.tab-btn.p2{border-color:#0d6efd;}.tab-btn.p2.active{background:#0d6efd;}
.tab-btn.p3{border-color:#fd7e14;}.tab-btn.p3.active{background:#fd7e14;}
.tab-btn.p4{border-color:#dc3545;}.tab-btn.p4.active{background:#dc3545;}
.part-progress{padding:8px 16px;background:#fff;border-bottom:1px solid #dee2e6;font-size:.82em;}
.prog-bar{height:8px;background:#dee2e6;border-radius:4px;margin-top:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .3s;background:#6f42c1;}
.search-bar{padding:10px 16px;background:#fff;border-bottom:1px solid #dee2e6;}
.search-bar input{width:100%;max-width:400px;padding:7px 12px;border:1px solid #ccc;border-radius:20px;font-size:.9em;}
.cards{padding:12px 16px;max-width:860px;margin:0 auto;}
.card{background:#fff;border:1px solid #dee2e6;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:box-shadow .2s;}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);}
.card.correct{border-left:4px solid var(--g1);}
.card.wrong{border-left:4px solid var(--r1);}
.card-header{padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;}
.card-num{font-size:.75em;font-weight:700;color:#fff;background:#6f42c1;padding:2px 7px;border-radius:10px;white-space:nowrap;margin-top:2px;min-width:38px;text-align:center;}
.card-num.p1{background:#28a745;}
.card-num.p2{background:#0d6efd;}
.card-num.p3{background:#fd7e14;}
.card-num.p4{background:#dc3545;}
.card-q{flex:1;}
.q-label{font-size:.7em;color:#888;font-weight:600;margin-bottom:3px;}
.q-main{font-size:1em;font-weight:700;line-height:1.4;}
.q-pron{font-size:.78em;color:#6f42c1;margin-top:2px;}
.hint-toggle{font-size:.72em;padding:3px 7px;border:1px solid #ccc;border-radius:8px;cursor:pointer;background:#fff;white-space:nowrap;flex-shrink:0;}
.hint-box{display:none;padding:4px 14px 8px 62px;font-size:.8em;color:#777;font-style:italic;background:#fffde7;border-bottom:1px solid #fff3cd;}
.hint-box.show{display:block;}
.card-body{padding:10px 14px 14px;border-top:1px solid #f0f0f0;display:none;}
.card-body.open{display:block;}
.reveal-btn{padding:7px 18px;background:#6f42c1;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.85em;font-weight:600;}
.reveal-btn:hover{background:#5a35a8;}
.ans-box{background:#f0f7ff;border:1px solid #cce4ff;border-radius:8px;padding:10px 14px;margin:8px 0 4px;}
.ans-box.ko{background:#f0fff4;border-color:#b8e6c8;}
.ans-box.chunk{background:#fff8f0;border-color:#ffe0b2;}
.ans-en{font-size:1.1em;font-weight:700;color:#0d6efd;margin-bottom:3px;}
.ans-pron{font-size:.85em;color:#6f42c1;margin-bottom:4px;}
.ans-ko{font-size:1em;font-weight:700;color:#28a745;}
.ans-chunk{font-size:1.1em;font-weight:700;color:#fd7e14;}
.chunk-pron{font-size:.82em;color:#888;margin-top:2px;}
.speak-btn{padding:4px 10px;background:#0d6efd;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.78em;margin-top:4px;}
.speak-btn:hover{background:#0b5ed7;}
.speak-btn.sm{background:#6f42c1;font-size:.75em;padding:3px 8px;}
.score-btns{display:flex;gap:8px;margin-top:10px;}
.score-btn{padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85em;}
.btn-correct{background:#28a745;color:#fff;}
.btn-wrong{background:#dc3545;color:#fff;}
.btn-correct:hover{background:#218838;}
.btn-wrong:hover{background:#c82333;}
.score-badge{display:none;font-size:.82em;font-weight:600;padding:4px 12px;border-radius:8px;margin-top:6px;display:inline-block;}
.score-badge:empty{display:none;}
.score-badge.c{background:#d4edda;color:#155724;}
.score-badge.w{background:#f8d7da;color:#721c24;}
@media(max-width:600px){.voice-bar{flex-direction:column;align-items:flex-start;}.tabs{gap:4px;}}
</style>
</head>
<body>
<h1>🧒 유아 150패턴 마스터 테스트</h1>

<div class="voice-bar">
  <span class="vdot vF"></span>
  <label>👩 여자 목소리:</label>
  <select id="selF" onchange="updateVoice('F')"></select>
  <span class="vdot vM"></span>
  <label>👨 남자 목소리:</label>
  <select id="selM" onchange="updateVoice('M')"></select>
  <span style="font-size:.74em;color:#888;margin-left:auto;">🔊 영어 듣기 지원</span>
</div>

<div class="score-bar">
  <span class="score-item s-correct">✅ 맞음: <span id="sC">0</span></span>
  <span class="score-item s-wrong">❌ 틀림: <span id="sW">0</span></span>
  <span class="score-item s-total">📊 총점: <span id="sTot">0/150</span></span>
  <button class="reset-btn" onclick="resetAll()">🔄 초기화</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 문제/정답 검색..." oninput="filterSearch()">
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="filterPart(0)">📋 전체</button>
  <button class="tab-btn p1" onclick="filterPart(1)">Part 1<br><small>한글→영어</small></button>
  <button class="tab-btn p2" onclick="filterPart(2)">Part 2<br><small>영어→한글</small></button>
  <button class="tab-btn p3" onclick="filterPart(3)">Part 3<br><small>청크 채우기</small></button>
  <button class="tab-btn p4" onclick="filterPart(4)">Part 4<br><small>상황 응용</small></button>
</div>

<div class="part-progress">
  <span id="progText">전체 진행: 0/150</span>
  <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div class="cards" id="cardsContainer"></div>

// ===== VOICE =====
let voices=[],voiceF=null,voiceM=null;
function loadVoices(){
  voices=speechSynthesis.getVoices();
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  if(!enV.length){setTimeout(loadVoices,300);return;}
  populateSel('selF',enV,['Samantha','Victoria','Karen','Moira','Zira','Female']);
  populateSel('selM',enV,['Daniel','Alex','Tom','Fred','David','Male']);
  autoSelect();
}
function populateSel(id,enV,keys){
  const sel=document.getElementById(id);
  sel.innerHTML='';
  enV.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name;sel.appendChild(o);});
  const fi=enV.findIndex(v=>keys.some(k=>v.name.includes(k)));
  if(fi>=0)sel.value=fi;
}
function autoSelect(){
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  const fK=['Samantha','Victoria','Karen','Moira','Zira','female','Female'];
  const mK=['Daniel','Alex','Tom','Fred','David','male','Male'];
  let fi=enV.findIndex(v=>fK.some(k=>v.name.includes(k)));
  let mi=enV.findIndex(v=>mK.some(k=>v.name.includes(k)));
  if(fi<0)fi=0; if(mi<0||mi===fi)mi=Math.min(1,enV.length-1);
  voiceF=enV[fi]||null; voiceM=enV[mi]||null;
}
function updateVoice(g){
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  const idx=parseInt(document.getElementById(g==='F'?'selF':'selM').value);
  if(g==='F')voiceF=enV[idx]||null; else voiceM=enV[idx]||null;
}
speechSynthesis.onvoiceschanged=loadVoices; loadVoices();

function speakText(txt,g,btn){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  const v=(g==='F'?voiceF:voiceM)||voiceF||null;
  if(v)u.voice=v; u.rate=0.9; u.lang='en-US';
  if(btn){const orig=btn.textContent;btn.textContent='▶ 재생중...';u.onend=()=>{btn.textContent=orig;};}
  speechSynthesis.speak(u);
}

// ===== SCORE =====
const scores={};
function updateScore(){
  let c=0,w=0;
  Object.values(scores).forEach(s=>{if(s==='c')c++;else if(s==='w')w++;});
  document.getElementById('sC').textContent=c;
  document.getElementById('sW').textContent=w;
  document.getElementById('sTot').textContent=(c+w)+'/150';
  updateProgress(currentPart);
}
function markScore(no,result,card){
  scores[no]=result;
  card.classList.remove('correct','wrong');
  card.classList.add(result==='c'?'correct':'wrong');
  const badge=card.querySelector('.score-badge');
  badge.className='score-badge '+(result==='c'?'c':'w');
  badge.textContent=result==='c'?'✅ 맞음!':'❌ 틀림';
  updateScore();
}
function resetAll(){
  if(!confirm('모든 점수를 초기화할까요?'))return;
  Object.keys(scores).forEach(k=>delete scores[k]);
  document.querySelectorAll('.card').forEach(c=>{
    c.classList.remove('correct','wrong');
    const badge=c.querySelector('.score-badge');
    if(badge){badge.className='score-badge';badge.textContent='';}
    const body=c.querySelector('.card-body');
    if(body)body.classList.remove('open');
    const rev=c.querySelector('.reveal-btn');
    if(rev)rev.style.display='';
    const revealed=c.querySelector('.ans-revealed');
    if(revealed)revealed.style.display='none';
  });
  updateScore();
}

// ===== RENDER =====
let currentPart=0;
const pClass=['p1','p2','p3','p4'];
const pColors={1:'#28a745',2:'#0d6efd',3:'#fd7e14',4:'#dc3545'};
const typeLabel={ko2en:'🇰🇷 한글→영어',en2ko:'🇺🇸 영어→한글',chunk:'🧩 청크 채우기',situation:'🎭 상황 응용'};

function buildAnsHTML(q){
  if(q.t==='ko2en'||q.t==='situation'){
    const spk=q.ans.replace(/\[.*?\]/g,'example').replace(/'/g,"\\'");
    return `<div class="ans-box">
      <div class="ans-en">💬 ${q.ans}</div>
      <div class="ans-pron">🔤 발음: ${q.pron}</div>
      <button class="speak-btn" onclick="speakText('${spk}','F',this)">🔊 영어 듣기</button>
    </div>`;
  } else if(q.t==='en2ko'){
    return `<div class="ans-box ko">
      <div class="ans-ko">🇰🇷 ${q.ans}</div>
    </div>`;
  } else {
    const spk=q.ans.replace(/[?.!,]/g,'').replace(/'/g,"\\'");
    return `<div class="ans-box chunk">
      <div style="font-size:.8em;color:#888;margin-bottom:2px;">빈칸 정답:</div>
      <div class="ans-chunk">「 ${q.ans} 」</div>
      <div class="chunk-pron">🔤 발음: ${q.pron}</div>
      <button class="speak-btn" onclick="speakText('${spk}','F',this)" style="margin-top:4px;">🔊 듣기</button>
    </div>`;
  }
}

function renderCards(){
  const con=document.getElementById('cardsContainer');
  con.innerHTML='';
  QS.forEach(q=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.part=q.p;
    card.dataset.no=q.no;
    card.dataset.q=(q.q||'').toLowerCase();
    card.dataset.ans=(q.ans||'').toLowerCase();

    const isEnQ=q.t==='en2ko';
    const spkQ=q.q.replace(/'/g,"\\'");

    let qHTML='';
    if(isEnQ){
      qHTML=`<div class="q-label">${typeLabel[q.t]} | 📂 ${q.cat}</div>
        <div class="q-main" style="color:#0d6efd;">${q.q}</div>
        <div class="q-pron">🔤 ${q.pron}</div>
        <button class="speak-btn sm" style="margin-top:5px;" onclick="event.stopPropagation();speakText('${spkQ}','F',this)">🔊 영어 듣기</button>`;
    } else {
      qHTML=`<div class="q-label">${typeLabel[q.t]} | 📂 ${q.cat}</div>
        <div class="q-main">${q.q}</div>`;
    }

    card.innerHTML=`
      <div class="card-header" onclick="toggleCard(this)">
        <span class="card-num ${pClass[q.p-1]}">${q.no}</span>
        <div class="card-q">${qHTML}</div>
        <span style="font-size:1.1em;flex-shrink:0;">${q.hint}</span>
        <button class="hint-toggle" onclick="event.stopPropagation();toggleHint(this)">💡 힌트</button>
      </div>
      <div class="hint-box">💡 ${q.hintT}</div>
      <div class="card-body">
        <button class="reveal-btn" onclick="revealAns(this)">✅ 정답 확인하기</button>
        <div class="ans-revealed" style="display:none;">
          ${buildAnsHTML(q)}
          <div class="score-btns">
            <button class="score-btn btn-correct" onclick="markScore('${q.no}','c',this.closest('.card'))">✅ 맞음</button>
            <button class="score-btn btn-wrong" onclick="markScore('${q.no}','w',this.closest('.card'))">❌ 틀림</button>
          </div>
          <div class="score-badge"></div>
        </div>
      </div>`;
    con.appendChild(card);
  });
}

function toggleCard(hdr){
  const body=hdr.nextElementSibling.nextElementSibling;
  body.classList.toggle('open');
}
function toggleHint(btn){
  const hb=btn.closest('.card-header').nextElementSibling;
  hb.classList.toggle('show');
  btn.textContent=hb.classList.contains('show')?'💡 숨기기':'💡 힌트';
}
function revealAns(btn){
  btn.style.display='none';
  btn.nextElementSibling.style.display='block';
}

// ===== FILTER =====
function filterPart(p,skipBtn=false){
  currentPart=p;
  if(!skipBtn){
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===p));
  }
  const term=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.card').forEach(c=>{
    const cp=parseInt(c.dataset.part);
    const partMatch=(p===0||cp===p);
    const searchMatch=!term||(c.dataset.q||'').includes(term)||(c.dataset.ans||'').includes(term);
    c.style.display=(partMatch&&searchMatch)?'':'none';
  });
  updateProgress(p);
}
function updateProgress(p){
  const relevant=QS.filter(q=>p===0||q.p===p);
  const done=relevant.filter(q=>scores[q.no]).length;
  const label=p===0?'전체':('Part '+p);
  document.getElementById('progText').textContent=`${label} 진행: ${done}/${relevant.length} 완료`;
  document.getElementById('progFill').style.width=(done/relevant.length*100)+'%';
}
function filterSearch(){
  filterPart(currentPart,true);
}

renderCards();
updateScore();
</script>
</body>
</html>
