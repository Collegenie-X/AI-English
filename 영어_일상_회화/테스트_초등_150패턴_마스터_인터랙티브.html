<html lang="ko">

<title>🏫 초등 150패턴 마스터 테스트 (인터랙티브)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f4ff;color:#333}
header{background:linear-gradient(135deg,#4f7ef5,#7b52e0);color:#fff;padding:18px 20px;text-align:center}
header h1{font-size:1.4em;margin-bottom:6px}
header p{font-size:.85em;opacity:.9}
.score-bar{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:12px 16px;background:#fff;border-bottom:2px solid #e0e7ff;font-size:.85em}
.sc-box{background:#f0f4ff;border-radius:10px;padding:6px 14px;font-weight:700}
.sc-box.ok{color:#22c55e}.sc-box.ng{color:#ef4444}.sc-box.tot{color:#6366f1}
.voice-panel{background:#fff;padding:10px 16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #e0e7ff;font-size:.82em}
.voice-panel label{font-weight:600;color:#555}
.voice-panel select{border:1.5px solid #c7d2fe;border-radius:8px;padding:4px 8px;font-size:.82em;color:#333;background:#f8f9ff;cursor:pointer}
.speed-ctrl{display:flex;align-items:center;gap:8px;font-size:.82em;background:#fff;padding:8px 16px;border-bottom:1px solid #e0e7ff}
.speed-ctrl span{font-weight:600;color:#555}
.spd-btn{border:1.5px solid #c7d2fe;background:#f0f4ff;color:#4f7ef5;border-radius:8px;padding:4px 10px;cursor:pointer;font-weight:700;font-size:.82em}
.spd-btn.active{background:#4f7ef5;color:#fff}
.filter-bar{display:flex;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #e0e7ff;overflow-x:auto;flex-wrap:nowrap}
.filter-bar button{border:1.5px solid #c7d2fe;background:#f8f9ff;color:#444;border-radius:20px;padding:5px 14px;cursor:pointer;white-space:nowrap;font-size:.82em;font-weight:600;transition:all .2s}
.filter-bar button.active{background:#4f7ef5;color:#fff;border-color:#4f7ef5}
.search-bar{padding:10px 16px;background:#fff;border-bottom:1px solid #e0e7ff}
.search-bar input{width:100%;border:1.5px solid #c7d2fe;border-radius:10px;padding:7px 14px;font-size:.85em;outline:none}
.search-bar input:focus{border-color:#4f7ef5}
.progress-wrap{padding:8px 16px;background:#fff;border-bottom:1px solid #e0e7ff;font-size:.8em;color:#555}
.prog-bar{height:8px;background:#e0e7ff;border-radius:4px;margin-top:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#4f7ef5,#7b52e0);border-radius:4px;transition:width .4s}
.container{max-width:800px;margin:0 auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.qcard{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(79,126,245,.1);overflow:hidden;border:1.5px solid #e0e7ff;transition:border-color .2s}
.qcard:hover{border-color:#c7d2fe}
.qcard summary{list-style:none;padding:14px 16px;cursor:pointer;display:flex;gap:10px;align-items:flex-start}
.qcard summary::-webkit-details-marker{display:none}
.q-num{background:linear-gradient(135deg,#4f7ef5,#7b52e0);color:#fff;border-radius:8px;padding:3px 9px;font-size:.78em;font-weight:700;white-space:nowrap;min-width:44px;text-align:center}
.q-body{flex:1}
.q-type-badge{display:inline-block;font-size:.7em;padding:2px 8px;border-radius:10px;margin-bottom:4px;font-weight:600}
.badge-ko2en{background:#dbeafe;color:#1d4ed8}
.badge-en2ko{background:#dcfce7;color:#15803d}
.badge-chunk{background:#fef3c7;color:#92400e}
.badge-sit{background:#fce7f3;color:#9d174d}
.q-text{font-size:1em;font-weight:700;color:#1e3a8a;line-height:1.4}
.q-text.en{color:#166534;font-style:italic}
.q-en-audio{display:flex;align-items:center;gap:8px;margin-top:6px}
.q-en-pron{font-size:.8em;color:#6b7280;background:#f9fafb;padding:3px 8px;border-radius:6px}
.speak-q-btn{border:none;background:#dcfce7;color:#15803d;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:.8em;font-weight:700}
.speak-q-btn:hover{background:#bbf7d0}
.hint-box{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:6px 10px;margin-top:6px;font-size:.82em;color:#78350f}
.hint-lv{font-weight:700;margin-right:4px}
.hint-txt{color:#92400e;font-family:monospace}
.q-arrow{margin-left:auto;color:#9ca3af;font-size:1em;transition:transform .2s}
details[open] .q-arrow{transform:rotate(180deg)}
.ans-section{padding:0 16px 14px}
.ans-box{background:#f0f9ff;border:1.5px solid #bae6fd;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.ans-box.ko{background:#f0fdf4;border-color:#bbf7d0}
.ans-box.chunk{background:#fffbeb;border-color:#fde68a}
.ans-box.sit{background:#fdf2f8;border-color:#f9a8d4}
.ans-en{font-size:1em;font-weight:700;color:#0c4a6e;margin-bottom:4px}
.ans-pron{font-size:.82em;color:#64748b;background:#e0f2fe;padding:3px 8px;border-radius:6px;display:inline-block;margin-bottom:6px}
.ans-ko{font-size:1em;font-weight:700;color:#14532d}
.ans-chunk-ctx{font-size:.88em;color:#555;line-height:1.6}
.ans-chunk{display:inline-block;background:#fef9c3;border:1.5px dashed #f59e0b;border-radius:6px;padding:2px 10px;font-weight:700;color:#92400e;font-size:1em;margin:2px}
.ans-sit-ctx{font-size:.88em;color:#555;font-style:italic;background:#fdf2f8;border-radius:6px;padding:6px 10px;margin-bottom:6px}
.speak-btn{border:none;background:#0ea5e9;color:#fff;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:.82em;font-weight:700;display:flex;align-items:center;gap:4px}
.speak-btn:hover{background:#0284c7}
.speak-btn.playing{background:#ef4444}
.score-btns{display:flex;gap:8px;margin-top:8px}
.btn-ok{border:none;background:#22c55e;color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;font-size:.82em}
.btn-ok:hover{background:#16a34a}
.btn-ng{border:none;background:#ef4444;color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:700;font-size:.82em}
.btn-ng:hover{background:#dc2626}
.btn-ok.selected{box-shadow:0 0 0 3px #86efac;transform:scale(1.05)}
.btn-ng.selected{box-shadow:0 0 0 3px #fca5a5;transform:scale(1.05)}
.reveal-btn{border:none;background:#6366f1;color:#fff;border-radius:8px;padding:7px 16px;cursor:pointer;font-weight:700;font-size:.85em;width:100%;margin-bottom:10px}
.reveal-btn:hover{background:#4f46e5}
.cat-label{font-size:.75em;color:#9ca3af;font-weight:600;margin-bottom:2px}
.no-result{text-align:center;padding:40px;color:#9ca3af;font-size:1em}
.expand-btns{display:flex;gap:8px;padding:8px 16px;background:#fff;border-bottom:1px solid #e0e7ff}
.expand-btns button{border:1.5px solid #c7d2fe;background:#f0f4ff;color:#4f7ef5;border-radius:8px;padding:5px 14px;cursor:pointer;font-size:.82em;font-weight:700}
.expand-btns button:hover{background:#4f7ef5;color:#fff}
@media(max-width:500px){.q-text{font-size:.92em}.score-bar{gap:8px}}
</style>
</head>
<body>

<header>
  <h1>🏫 초등 150패턴 마스터 테스트</h1>
  <p>Part 1: 한글→영어 (50) · Part 2: 영어→한글 (50) · Part 3: 청크 채우기 (30) · Part 4: 대화완성 (20)</p>
</header>

<div class="score-bar">
  <div class="sc-box ok">✅ 맞음: <span id="sc-ok">0</span></div>
  <div class="sc-box ng">❌ 틀림: <span id="sc-ng">0</span></div>
  <div class="sc-box tot">📊 총점: <span id="sc-tot">0</span>/150</div>
  <div class="sc-box" style="color:#6366f1">🎯 정확도: <span id="sc-pct">0</span>%</div>
</div>

<div class="voice-panel">
  <span>🎙️ 음성 설정:</span>
  <label>👩 여성:</label>
  <select id="voiceF" onchange="updateVoice()"></select>
  <label>👨 남성:</label>
  <select id="voiceM" onchange="updateVoice()"></select>
</div>

<div class="speed-ctrl">
  <span>🎚️ 속도:</span>
  <button class="spd-btn" onclick="setSpeed(0.75)">0.75x</button>
  <button class="spd-btn" onclick="setSpeed(0.9)">0.9x</button>
  <button class="spd-btn active" onclick="setSpeed(1.0)">1.0x</button>
  <button class="spd-btn" onclick="setSpeed(1.25)">1.25x</button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="active" onclick="filterPart('all')">📚 전체</button>
  <button onclick="filterPart(1)">Part 1 · 한글→영어</button>
  <button onclick="filterPart(2)">Part 2 · 영어→한글</button>
  <button onclick="filterPart(3)">Part 3 · 청크채우기</button>
  <button onclick="filterPart(4)">Part 4 · 대화완성</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 문제 검색..." oninput="filterSearch()">
</div>

<div class="progress-wrap">
  <div id="prog-label">전체 진행률: 0 / 150</div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="expand-btns">
  <button onclick="expandAll()">📂 전체 열기</button>
  <button onclick="collapseAll()">📁 전체 닫기</button>
  <button onclick="resetScores()">🔄 점수 초기화</button>
</div>

<div class="container" id="qContainer"></div>

// ─── STATE ───
let spd=1.0;
let voiceF=null,voiceM=null;
let allVoices=[];
let scores={};
let curPart='all';
let curSearch='';

// ─── VOICE ───
function loadVoices(){
  allVoices=speechSynthesis.getVoices();
  const fSel=document.getElementById('voiceF');
  const mSel=document.getElementById('voiceM');
  fSel.innerHTML='';mSel.innerHTML='';
  allVoices.forEach((v,i)=>{
    const o=document.createElement('option');
    o.value=i;o.textContent=`${v.name} (${v.lang})`;
    fSel.appendChild(o.cloneNode(true));
    mSel.appendChild(o);
  });
  // auto-select female voice
  const fNames=['Samantha','Victoria','Karen','Zira','Google UK English Female','Yuna','Kyoko'];
  const mNames=['Daniel','Alex','Tom','David','Google UK English Male','Fred'];
  let fi=allVoices.findIndex(v=>fNames.some(n=>v.name.includes(n)));
  let mi=allVoices.findIndex(v=>mNames.some(n=>v.name.includes(n)));
  if(fi<0)fi=0;
  if(mi<0)mi=Math.min(1,allVoices.length-1);
  fSel.value=fi;mSel.value=mi;
  voiceF=allVoices[fi];voiceM=allVoices[mi];
}
function updateVoice(){
  voiceF=allVoices[document.getElementById('voiceF').value];
  voiceM=allVoices[document.getElementById('voiceM').value];
}
speechSynthesis.onvoiceschanged=loadVoices;
loadVoices();

// ─── SPEAK ───
function speakText(txt,g,btn){
  if(!txt)return;
  speechSynthesis.cancel();
  if(btn&&btn.classList.contains('playing')){btn.classList.remove('playing');btn.textContent='🔊 영어 듣기';return;}
  document.querySelectorAll('.speak-btn.playing').forEach(b=>{b.classList.remove('playing');b.textContent='🔊 영어 듣기';});
  const u=new SpeechSynthesisUtterance(txt);
  u.rate=spd;u.pitch=g==='F'?1.15:0.9;
  const v=g==='F'?voiceF:voiceM;
  if(v)u.voice=v;
  if(btn){btn.classList.add('playing');btn.textContent='⏹ 중지';}
  u.onend=()=>{if(btn){btn.classList.remove('playing');btn.textContent='🔊 영어 듣기';}};
  u.onerror=()=>{if(btn){btn.classList.remove('playing');btn.textContent='🔊 영어 듣기';}};
  speechSynthesis.speak(u);
}

// ─── SPEED ───
function setSpeed(s){
  spd=s;
  document.querySelectorAll('.spd-btn').forEach(b=>{
    b.classList.toggle('active',parseFloat(b.textContent)===s);
  });
}

// ─── SCORE ───
let okCnt=0,ngCnt=0;
function markScore(no,type){
  const prev=scores[no];
  if(prev===type){scores[no]=null;}else{scores[no]=type;}
  recalcScore();
  updateProgress();
  const card=document.querySelector(`[data-no="${no}"]`);
  if(card){
    const btnOk=card.querySelector('.btn-ok');
    const btnNg=card.querySelector('.btn-ng');
    if(btnOk)btnOk.classList.toggle('selected',scores[no]==='ok');
    if(btnNg)btnNg.classList.toggle('selected',scores[no]==='ng');
  }
}
function recalcScore(){
  okCnt=Object.values(scores).filter(v=>v==='ok').length;
  ngCnt=Object.values(scores).filter(v=>v==='ng').length;
  const tot=okCnt+ngCnt;
  document.getElementById('sc-ok').textContent=okCnt;
  document.getElementById('sc-ng').textContent=ngCnt;
  document.getElementById('sc-tot').textContent=tot;
  document.getElementById('sc-pct').textContent=tot?Math.round(okCnt/tot*100):0;
}
function resetScores(){
  scores={};okCnt=0;ngCnt=0;
  document.querySelectorAll('.btn-ok,.btn-ng').forEach(b=>b.classList.remove('selected'));
  recalcScore();updateProgress();
}

// ─── PROGRESS ───
function updateProgress(){
  const visible=Array.from(document.querySelectorAll('.qcard')).filter(c=>c.style.display!=='none');
  const answered=visible.filter(c=>scores[c.dataset.no]).length;
  const total=visible.length;
  document.getElementById('prog-label').textContent=`진행률: ${answered} / ${total}`;
  document.getElementById('prog-fill').style.width=total?(answered/total*100)+'%':'0%';
}

// ─── BUILD HTML ───
function buildTypeLabel(t){
  switch(t){
    case'ko2en':return'<span class="q-type-badge badge-ko2en">🇰🇷→🇺🇸 한글→영어</span>';
    case'en2ko':return'<span class="q-type-badge badge-en2ko">🇺🇸→🇰🇷 영어→한글</span>';
    case'chunk':return'<span class="q-type-badge badge-chunk">🧩 청크 채우기</span>';
    case'situation':return'<span class="q-type-badge badge-sit">💬 대화 완성</span>';
  }return'';
}

function buildCard(q){
  const typeLbl=buildTypeLabel(q.t);
  const catLbl=`<div class="cat-label">📁 ${q.cat}</div>`;

  // ─ Question display in summary ─
  let qDisplay='';
  if(q.t==='en2ko'){
    // English question with audio button shown in summary
    qDisplay=`
      <div class="q-en-audio">
        <span class="q-text en">🔊 ${q.q}</span>
        <button class="speak-q-btn" onclick="event.stopPropagation();speakText('${escQ(q.q)}','F',null)">▶ 듣기</button>
      </div>
      ${q.qPron?`<div class="q-en-pron">🔤 ${q.qPron}</div>`:''}
    `;
  } else if(q.t==='chunk'){
    qDisplay=`<div class="q-text">🧩 ${q.q}</div>`;
  } else if(q.t==='situation'){
    qDisplay=`<div class="q-text">💬 상황: <em>${q.sit||''}</em></div>`;
  } else {
    qDisplay=`<div class="q-text">🇰🇷 ${q.q}</div>`;
  }

  // ─ Hint ─
  const hintHTML=`<div class="hint-box"><span class="hint-lv">${q.hint}</span><span class="hint-txt">${q.hintT}</span></div>`;

  // ─ Answer box ─
  let ansHTML='';
  if(q.t==='ko2en'||q.t==='situation'){
    const safeAns=escQ(q.ans);
    ansHTML=`
      <div class="ans-box ${q.t==='situation'?'sit':''}">
        ${q.t==='situation'?`<div class="ans-sit-ctx">${q.q.replace(/\n/g,'<br>')}</div>`:''}
        <div class="ans-en">💬 ${q.ans}</div>
        <div class="ans-pron">🔤 발음: ${q.pron}</div>
        <button class="speak-btn" onclick="speakText('${safeAns}','F',this)">🔊 영어 듣기</button>
      </div>`;
  } else if(q.t==='en2ko'){
    ansHTML=`
      <div class="ans-box ko">
        <div class="ans-ko">🇰🇷 ${q.ans}</div>
      </div>`;
  } else if(q.t==='chunk'){
    const safeAns=escQ(q.ans);
    ansHTML=`
      <div class="ans-box chunk">
        <div class="ans-chunk-ctx">${q.ctx||q.q} → <span class="ans-chunk">「 ${q.ans} 」</span></div>
        <div class="ans-pron" style="margin-top:6px">🔤 발음: ${q.pron}</div>
        <button class="speak-btn" style="margin-top:6px" onclick="speakText('${safeAns}','F',this)">🔊 영어 듣기</button>
      </div>`;
  }

  const okSel=scores[q.no]==='ok'?'selected':'';
  const ngSel=scores[q.no]==='ng'?'selected':'';

  return `
<details class="qcard" data-no="${q.no}" data-part="${q.p}">
  <summary class="qcard-sum">
    <span class="q-num">No.${q.no}</span>
    <div class="q-body">
      ${catLbl}
      ${typeLbl}
      ${qDisplay}
      ${hintHTML}
    </div>
    <span class="q-arrow">▼</span>
  </summary>
  <div class="ans-section">
    <button class="reveal-btn" onclick="this.nextElementSibling.style.display='block';this.style.display='none'">🔓 정답 보기</button>
    <div style="display:none">
      ${ansHTML}
      <div class="score-btns">
        <button class="btn-ok ${okSel}" onclick="markScore('${q.no}','ok')">✅ 맞음</button>
        <button class="btn-ng ${ngSel}" onclick="markScore('${q.no}','ng')">❌ 틀림</button>
      </div>
    </div>
  </div>
</details>`;
}

function escQ(s){return(s||'').replace(/'/g,"\\'").replace(/\n/g,' ');}

function renderCards(){
  const container=document.getElementById('qContainer');
  let filtered=DATA.filter(q=>{
    if(curPart!=='all'&&q.p!==curPart)return false;
    if(curSearch){
      const s=curSearch.toLowerCase();
      if(!q.q.toLowerCase().includes(s)&&!q.ans.toLowerCase().includes(s)&&!q.cat.toLowerCase().includes(s))return false;
    }
    return true;
  });
  if(filtered.length===0){
    container.innerHTML='<div class="no-result">🔍 검색 결과가 없습니다.</div>';
    updateProgress();return;
  }
  container.innerHTML=filtered.map(buildCard).join('');
  updateProgress();
}

function filterPart(p){
  curPart=p;
  document.querySelectorAll('.filter-bar button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderCards();
}

function filterSearch(){
  curSearch=document.getElementById('searchInput').value.trim();
  renderCards();
}

function expandAll(){document.querySelectorAll('.qcard').forEach(d=>d.setAttribute('open',''));}
function collapseAll(){document.querySelectorAll('.qcard').forEach(d=>d.removeAttribute('open'));}

renderCards();
</script>
