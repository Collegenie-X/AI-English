<style>
:root{--F:#D63384;--M:#0d6efd;--bg:#f8f9fa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:#222;}
h1{text-align:center;padding:18px;background:linear-gradient(135deg,#28a745,#20c997);color:#fff;font-size:1.4em;}
.subtitle{text-align:center;background:#d4edda;color:#155724;padding:6px;font-size:.85em;}
.voice-bar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:10px 16px;background:#fff;border-bottom:2px solid #dee2e6;}
.voice-bar label{font-size:.82em;font-weight:600;}
.voice-bar select{font-size:.8em;padding:3px 6px;border:1px solid #ccc;border-radius:6px;}
.vdot{display:inline-block;width:10px;height:10px;border-radius:50%;}
.vdot.vF{background:var(--F);}
.vdot.vM{background:var(--M);}
.ctrl-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 16px;background:#fff;border-bottom:1px solid #dee2e6;}
.ctrl-bar label{font-size:.8em;color:#666;}
.ctrl-bar select,.ctrl-bar input{font-size:.8em;padding:3px 7px;border:1px solid #ccc;border-radius:6px;}
.play-btn{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.85em;}
.play-btn.green{background:#28a745;color:#fff;}
.play-btn.blue{background:#0d6efd;color:#fff;}
.play-btn.red{background:#dc3545;color:#fff;}
.play-btn:hover{opacity:.88;}
.search-bar{padding:10px 16px;background:#fff;border-bottom:1px solid #dee2e6;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.search-bar input{flex:1;min-width:180px;max-width:340px;padding:7px 12px;border:1px solid #ccc;border-radius:20px;font-size:.9em;}
.cat-filter{display:flex;flex-wrap:wrap;gap:5px;padding:10px 16px;background:#fff;border-bottom:1px solid #dee2e6;}
.cat-btn{padding:4px 10px;border:1px solid #dee2e6;border-radius:16px;background:#fff;cursor:pointer;font-size:.78em;font-weight:600;}
.cat-btn.active{background:#28a745;color:#fff;border-color:#28a745;}
.cards{padding:12px 16px;max-width:900px;margin:0 auto;}
details{background:#fff;border:1px solid #dee2e6;border-radius:12px;margin-bottom:10px;overflow:hidden;}
details[open]{border-color:#28a745;box-shadow:0 2px 12px rgba(40,167,69,.12);}
summary{list-style:none;padding:12px 14px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;user-select:none;}
summary::-webkit-details-marker{display:none;}
.pnum{font-size:.75em;font-weight:700;color:#fff;background:#28a745;padding:2px 8px;border-radius:10px;white-space:nowrap;margin-top:2px;min-width:38px;text-align:center;}
.sum-body{flex:1;}
.q-ko{font-size:1.05em;font-weight:700;color:#155724;line-height:1.35;}
.q-cat{font-size:.72em;color:#888;margin-top:2px;}
.star-row{font-size:.85em;margin-top:3px;}
.chev{font-size:.85em;color:#aaa;flex-shrink:0;margin-top:3px;}
.card-body{padding:10px 14px 16px;}
.ans-en-box{background:#f0fff4;border:1px solid #b8e6c8;border-radius:8px;padding:10px 14px;margin:8px 0;}
.ans-en-main{font-size:1.1em;font-weight:700;color:#155724;}
.ans-pron{font-size:.85em;color:#6f42c1;margin-top:3px;}
.speak-main-btn{margin-top:6px;padding:5px 12px;background:#28a745;color:#fff;border:none;border-radius:7px;cursor:pointer;font-size:.8em;}
.speak-main-btn:hover{background:#218838;}
.section-title{font-size:.78em;font-weight:700;color:#555;margin:10px 0 6px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee;padding-bottom:3px;}
.chunks{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.chunk-item{border:1px solid #dee2e6;border-radius:8px;padding:6px 10px;text-align:center;min-width:70px;background:#fafafa;}
.c-en{font-size:.9em;font-weight:700;color:#0d6efd;}
.c-pron{font-size:.75em;color:#6f42c1;}
.c-ko{font-size:.75em;color:#333;}
.dial-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.dl{padding:8px 12px;border-radius:8px;}
.dl.sF{background:#fff0f8;border:1px solid #f5c6e0;}
.dl.sM{background:#f0f5ff;border:1px solid #c6d8f5;}
.dl-header{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.spk-badge{font-size:.75em;font-weight:700;}
.spk-badge.F{color:var(--F);}
.spk-badge.M{color:var(--M);}
.dl-en{font-size:.9em;font-weight:600;}
.dl-pron{font-size:.75em;color:#6f42c1;margin:1px 0;}
.dl-ko{font-size:.78em;color:#555;}
.speak-dl-btn{margin-top:4px;padding:3px 8px;border:none;border-radius:5px;cursor:pointer;font-size:.72em;color:#fff;}
.speak-dl-btn.F{background:var(--F);}
.speak-dl-btn.M{background:var(--M);}
.speak-dl-btn:hover{opacity:.82;}
.prac-list{list-style:none;}
.prac-list li{font-size:.82em;padding:3px 0;border-bottom:1px solid #f5f5f5;color:#555;}
.prac-list li::before{content:"💡 ";font-size:.9em;}
.play-all-btn,.play-one-btn{padding:5px 12px;border:none;border-radius:7px;cursor:pointer;font-size:.78em;color:#fff;font-weight:600;}
.play-all-btn{background:#28a745;}
.play-one-btn{background:#0d6efd;}
.play-all-btn:hover{background:#218838;}
.play-one-btn:hover{background:#0b5ed7;}
@media(max-width:600px){.voice-bar{flex-direction:column;align-items:flex-start;}}
</style>

<body>
<h1>📚 전설의 초등 회화 150패턴</h1>
<div class="subtitle">🇰🇷 한국어 문제 → 🇺🇸 영어 답변 | 끊어읽기 + 한국어 발음 | 여자/남자 목소리 구분</div>

<div class="voice-bar">
  <span class="vdot vF"></span><label>👩 여자(A):</label>
  <select id="selF" onchange="updateVoice('F')"></select>
  <span class="vdot vM"></span><label>👨 남자(B):</label>
  <select id="selM" onchange="updateVoice('M')"></select>
</div>

<div class="ctrl-bar">
  <label>⚡ 속도:</label>
  <select id="speed">
    <option value="0.75">0.75x</option>
    <option value="0.9" selected>0.9x</option>
    <option value="1.0">1.0x</option>
    <option value="1.25">1.25x</option>
  </select>
  <label>⏱️ 간격:</label>
  <input type="range" id="gap" min="0" max="3" step="0.5" value="1" style="width:80px;">
  <span id="gapVal">1s</span>
  <button class="play-btn red" onclick="stopAll()">⏹ 정지</button>
  <button class="play-btn green" onclick="expandAll()">🔽 전체 펼치기</button>
  <button class="play-btn blue" onclick="collapseAll()">🔼 전체 접기</button>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="🔍 한국어/영어 검색..." oninput="filterCards()">
  <button class="play-btn green" onclick="clearSearch()">✕ 초기화</button>
</div>

<div class="cat-filter" id="catFilter"></div>
<div class="cards" id="cardsContainer"></div>

// ==================== VOICE ====================
let voices=[],voiceF=null,voiceM=null;
function loadVoices(){
  voices=speechSynthesis.getVoices();
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  if(!enV.length){setTimeout(loadVoices,300);return;}
  populateSel('selF',enV,['Samantha','Victoria','Karen','Moira','Zira','Female']);
  populateSel('selM',enV,['Daniel','Alex','Tom','Fred','David','Male']);
  autoSelect();
}
function populateSel(id,enV,keys){
  const sel=document.getElementById(id);
  sel.innerHTML='';
  enV.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name;sel.appendChild(o);});
  const fi=enV.findIndex(v=>keys.some(k=>v.name.includes(k)));
  if(fi>=0)sel.value=fi;
}
function autoSelect(){
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  const fK=['Samantha','Victoria','Karen','Moira','Zira','female'];
  const mK=['Daniel','Alex','Tom','Fred','David','male'];
  let fi=enV.findIndex(v=>fK.some(k=>v.name.includes(k)));
  let mi=enV.findIndex(v=>mK.some(k=>v.name.includes(k)));
  if(fi<0)fi=0; if(mi<0||mi===fi)mi=Math.min(1,enV.length-1);
  voiceF=enV[fi]||null; voiceM=enV[mi]||null;
}
function updateVoice(g){
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  const idx=parseInt(document.getElementById(g==='F'?'selF':'selM').value);
  if(g==='F')voiceF=enV[idx]||null; else voiceM=enV[idx]||null;
}
speechSynthesis.onvoiceschanged=loadVoices; loadVoices();

function getSpd(){return parseFloat(document.getElementById('speed').value)||0.9;}
function getGap(){return parseFloat(document.getElementById('gap').value)||1;}

function speakText(txt,g,btn){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(txt);
  const v=(g==='F'?voiceF:voiceM)||voiceF||null;
  if(v)u.voice=v; u.rate=getSpd(); u.lang='en-US';
  if(btn){const orig=btn.textContent;btn.textContent='▶ 재생중...';u.onend=()=>{btn.textContent=orig;};}
  speechSynthesis.speak(u);
}

let playing=false;
function stopAll(){
  playing=false; speechSynthesis.cancel();
}

// ==================== CATEGORIES ====================
const allCats=[...new Set(PATTERNS.map(p=>p.cat))];
let activeCat='all';

function buildCatFilter(){
  const div=document.getElementById('catFilter');
  div.innerHTML='';
  const all=document.createElement('button');
  all.className='cat-btn active';all.textContent='📋 전체';
  all.onclick=()=>filterCat('all',all);
  div.appendChild(all);
  allCats.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cat-btn';btn.textContent=c;
    btn.onclick=()=>filterCat(c,btn);
    div.appendChild(btn);
  });
}

function filterCat(cat,btn){
  activeCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards(){
  const term=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('details[data-no]').forEach(d=>{
    const cat=d.dataset.cat||'';
    const q=(d.dataset.ko||'').toLowerCase();
    const a=(d.dataset.en||'').toLowerCase();
    const catMatch=(activeCat==='all'||cat===activeCat);
    const termMatch=!term||q.includes(term)||a.includes(term);
    d.style.display=(catMatch&&termMatch)?'':'none';
  });
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  filterCards();
}

function expandAll(){document.querySelectorAll('details').forEach(d=>d.open=true);}
function collapseAll(){document.querySelectorAll('details').forEach(d=>d.open=false);}

// ==================== RENDER ====================
function stars(n){return '⭐'.repeat(n)+'☆'.repeat(5-n);}

function buildChunks(chunks){
  return chunks.map(c=>`<div class="chunk-item">
    <div class="c-en">${c.en}</div>
    <div class="c-pron">${c.pron}</div>
    <div class="c-ko">${c.ko}</div>
  </div>`).join('');
}

function buildDial(dial,no){
  return dial.map((d,i)=>{
    const badge=d.g==='F'?`👩 ${d.role||'A'}`:`👨 ${d.role||'B'}`;
    const spkEn=d.en.replace(/'/g,"\\'");
    return `<div class="dl s${d.g}" data-g="${d.g}">
      <div class="dl-header">
        <span class="spk-badge ${d.g}">${badge}</span>
        <button class="speak-dl-btn ${d.g}" onclick="speakText('${spkEn}','${d.g}',this)">🔊 듣기</button>
      </div>
      <div class="dl-en">${d.en}</div>
      <div class="dl-pron">🔤 ${d.pron}</div>
      <div class="dl-ko">🇰🇷 ${d.ko}</div>
    </div>`;
  }).join('');
}

function playAllDial(no){
  const details=document.querySelector(`details[data-no="${no}"]`);
  const lines=details.querySelectorAll('.dl');
  if(!lines.length)return;
  playing=true;
  let idx=0;
  function next(){
    if(!playing||idx>=lines.length)return;
    lines.forEach(l=>l.style.outline='');
    lines[idx].style.outline='2px solid #28a745';
    lines[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
    const en=lines[idx].querySelector('.dl-en').textContent;
    const g=lines[idx].dataset.g||'F';
    const u=new SpeechSynthesisUtterance(en);
    const v=(g==='F'?voiceF:voiceM)||voiceF||null;
    if(v)u.voice=v; u.rate=getSpd(); u.lang='en-US';
    u.onend=()=>{
      lines[idx].style.outline='';
      idx++;
      if(idx<lines.length&&playing){
        setTimeout(next,getGap()*1000);
      }
    };
    speechSynthesis.speak(u);
  }
  next();
}

function renderCards(){
  const con=document.getElementById('cardsContainer');
  con.innerHTML='';
  PATTERNS.forEach(p=>{
    const det=document.createElement('details');
    det.dataset.no=p.no;
    det.dataset.cat=p.cat;
    det.dataset.ko=p.ko;
    det.dataset.en=p.en;

    const spkEn=p.en.replace(/'/g,"\\'");
    det.innerHTML=`
      <summary>
        <span class="pnum">${p.no}</span>
        <div class="sum-body">
          <div class="q-ko">${p.ko}</div>
          <div class="q-cat">${p.cat} &nbsp;|&nbsp; 영어 답 클릭해서 확인</div>
          <div class="star-row">${stars(p.star)}</div>
        </div>
        <span class="chev">▼</span>
      </summary>
      <div class="card-body">
        <div class="ans-en-box">
          <div class="ans-en-main">💬 ${p.en}</div>
          <div class="ans-pron">🔤 발음: ${p.pron}</div>
          <button class="speak-main-btn" onclick="speakText('${spkEn}','F',this)">🔊 전체 듣기</button>
        </div>
        <div class="section-title">🧩 끊어읽기 (청크)</div>
        <div class="chunks">${buildChunks(p.chunk)}</div>
        <div class="section-title">💬 실전 대화
          <button class="play-all-btn" style="margin-left:8px;font-size:.72em;" onclick="playAllDial('${p.no}')">▶ 전체 듣기</button>
          <button class="play-btn red" style="margin-left:4px;font-size:.72em;padding:3px 8px;" onclick="stopAll()">⏹ 정지</button>
        </div>
        <div class="dial-list">${buildDial(p.dial,p.no)}</div>
        ${p.prac?`<div class="section-title">🎯 응용 연습</div>
        <ul class="prac-list">${p.prac.map(pr=>`<li>${pr}</li>`).join('')}</ul>`:''}
      </div>`;
    con.appendChild(det);
  });

  // Gap display
  document.getElementById('gap').oninput=function(){
    document.getElementById('gapVal').textContent=this.value+'s';
  };
}

buildCatFilter();
renderCards();
</script>
