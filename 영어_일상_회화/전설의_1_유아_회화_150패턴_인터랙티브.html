<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧒 전설의 유아 회화 150패턴</title>
<style>
:root{
  --F:#D63384;--F-l:#f8d7e9;--F-ll:#fff0f6;
  --M:#0d6efd;--M-l:#cfe2ff;--M-ll:#e8f0ff;
  --green:#38a169;--green-l:#c6f6d5;--green-ll:#f0fff4;
  --grad:linear-gradient(135deg,#667eea,#764ba2);
  --bg:#f4f6fb;--card:#fff;--border:#e2e8f0;--radius:14px;
  --shadow:0 2px 10px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;background:var(--bg);color:#2d3748;line-height:1.6;padding-bottom:70px}

/* ── Header ── */
header{background:var(--grad);color:#fff;padding:26px 20px 18px;text-align:center}
header h1{font-size:1.65rem;margin-bottom:5px}
header p{font-size:.88rem;opacity:.9}
.hbadges{display:flex;justify-content:center;gap:9px;margin-top:12px;flex-wrap:wrap}
.hb{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 13px;font-size:.78rem;font-weight:600}

/* ── Voice selector ── */
.voice-bar{background:#fff;border-bottom:2px solid #e2e8f0;padding:10px 18px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.voice-bar label{font-size:.78rem;font-weight:700;color:#4a5568;white-space:nowrap}
.voice-bar select{padding:4px 8px;border:1.5px solid #e2e8f0;border-radius:7px;font-size:.78rem;outline:none;min-width:160px;background:#f8f9fa}
.vdot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:5px}
.vF{background:var(--F)}.vM{background:var(--M)}

/* ── Ctrl bar ── */
.ctrl-bar{background:#fff;border-bottom:1px solid var(--border);padding:9px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.ctrl-bar input{flex:1;min-width:160px;padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.86rem;outline:none}
.ctrl-bar input:focus{border-color:#667eea}
.cbtn{padding:7px 13px;border:none;border-radius:8px;cursor:pointer;font-size:.8rem;font-weight:700}
.cbtn.ex{background:#667eea;color:#fff}.cbtn.co{background:#e2e8f0;color:#4a5568}
.spd-wrap{display:flex;align-items:center;gap:4px;margin-left:auto;font-size:.74rem;font-weight:700;color:#4a5568}
.sbtn{padding:2px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:.7rem;cursor:pointer;font-weight:700;background:#fff;color:#4a5568;transition:.15s}
.sbtn.sa{background:#667eea;color:#fff;border-color:#667eea}

/* ── TOC ── */
.toc-w{max-width:980px;margin:16px auto;padding:0 16px}
.toc-d summary{cursor:pointer;font-weight:700;color:#667eea;padding:9px 14px;background:#fff;border-radius:var(--radius);border:1.5px solid #c3d1f0;list-style:none;display:flex;align-items:center;gap:8px}
.toc-d summary::-webkit-details-marker{display:none}
.toc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;padding:10px 0}
.toc-a{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff;border-radius:8px;border:1px solid var(--border);text-decoration:none;color:#2d3748;font-size:.8rem;transition:.15s}
.toc-a:hover{border-color:#667eea;background:#f0f4ff;transform:translateY(-1px)}
.toc-n{font-weight:700;color:#667eea;font-size:.74rem;min-width:28px}

/* ── Pattern card ── */
main{max-width:920px;margin:0 auto;padding:0 16px}
.cat-hdr{font-size:.95rem;font-weight:800;color:#667eea;padding:14px 4px 6px;border-bottom:2px solid #e2e8f0;margin-bottom:10px}
.pw{margin-bottom:12px}
.pd{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden}
.pd[open]{border-color:#a0aec0}

/* Summary = Korean question front */
.ps{cursor:pointer;list-style:none;user-select:none;display:flex;align-items:flex-start;gap:10px;padding:14px 16px;background:linear-gradient(90deg,#f7f8fc,#fff);transition:background .2s}
.ps::-webkit-details-marker{display:none}
.pd[open] .ps{background:linear-gradient(90deg,#eef2ff,#f7f8ff)}
.ps:hover{background:#eef2ff}
.pnum{background:var(--grad);color:#fff;border-radius:7px;padding:3px 9px;font-size:.74rem;font-weight:700;white-space:nowrap;flex-shrink:0;margin-top:2px}

/* Korean question (main visible) */
.q-ko{font-size:1.05rem;font-weight:800;color:#2d3748;line-height:1.4;flex:1}
.q-cat{font-size:.72rem;color:#a0aec0;font-weight:600;margin-top:2px}
.star{font-size:.75rem;color:#f6ad55;flex-shrink:0;margin-top:4px}

/* ── Body ── */
.pb{padding:14px 16px 18px;border-top:1px solid var(--border)}

/* English answer box */
.ans-en-box{background:linear-gradient(90deg,#eef2ff,#f7f8ff);border:2px solid #c3d1f0;border-radius:10px;padding:12px 15px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.ans-en-text{flex:1}
.ans-en-main{font-size:1.1rem;font-weight:800;color:#3730a3;letter-spacing:.3px}
.ans-pron{font-size:.82rem;color:#6366f1;margin-top:3px;font-style:italic}
.btn-ans-speak{padding:5px 12px;border:none;border-radius:7px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:.2s;box-shadow:0 2px 6px rgba(102,126,234,.3)}
.btn-ans-speak:hover{transform:translateY(-1px)}
.btn-ans-speak.spk{background:linear-gradient(135deg,#e53e3e,#c53030);animation:pulse .9s infinite}

/* Chunk box */
.chunk-box{background:#fffbeb;border:1.5px solid #fbd38d;border-radius:9px;padding:11px 14px;margin-bottom:12px}
.chunk-label{font-size:.73rem;font-weight:800;color:#92400e;margin-bottom:6px}
.chunk-row{display:flex;flex-wrap:wrap;gap:8px}
.chunk-item{background:#fff;border:1.5px solid #fbd38d;border-radius:8px;padding:7px 11px;text-align:center;min-width:80px}
.c-en{font-size:.9rem;font-weight:700;color:#2d3748}
.c-pron{font-size:.76rem;color:#d97706;margin:2px 0;font-style:italic}
.c-ko{font-size:.76rem;color:#718096}

/* Dialogue */
.dial-hdr{display:flex;align-items:center;gap:8px;margin:12px 0 6px}
.dial-title{font-size:.84rem;font-weight:700;color:#276749;flex:1}
.btn-play-all{padding:5px 13px;border:none;border-radius:7px;font-size:.76rem;cursor:pointer;font-weight:700;background:linear-gradient(135deg,#38a169,#2f855a);color:#fff;transition:.2s;box-shadow:0 2px 5px rgba(56,161,105,.3)}
.btn-play-all:hover{transform:translateY(-1px)}
.btn-play-all.ps-on{background:linear-gradient(135deg,#e53e3e,#c53030);animation:pulse 1.1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

.play-ctrl{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:7px 11px;background:var(--green-ll);border:1px solid var(--green-l);border-radius:9px;margin-bottom:8px}
.intv-wrap{display:flex;align-items:center;gap:5px;font-size:.73rem;font-weight:700;color:#276749;white-space:nowrap}
.intv-sl{-webkit-appearance:none;appearance:none;width:80px;height:4px;border-radius:3px;background:var(--green-l);outline:none;cursor:pointer}
.intv-sl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#38a169;cursor:pointer}
.intv-val{min-width:26px;text-align:center;font-size:.74rem;font-weight:700;color:#276749;background:var(--green-l);border-radius:4px;padding:1px 4px}
.play-prog{font-size:.72rem;font-weight:700;color:#718096;background:#edf2f7;border-radius:10px;padding:2px 9px;white-space:nowrap;margin-left:auto}
.play-prog.on{color:#276749;background:var(--green-l)}

.dl{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:9px;margin-bottom:6px;border:1.5px solid transparent;transition:.2s}
.dl.sF{background:var(--F-ll);border-color:var(--F-l)}
.dl.sM{background:var(--M-ll);border-color:var(--M-l)}
.dl.spk{transform:scale(1.01);box-shadow:0 0 0 2.5px rgba(102,126,234,.45)}
.spk-badge{font-size:.68rem;font-weight:800;padding:3px 8px;border-radius:8px;white-space:nowrap;min-width:36px;text-align:center;flex-shrink:0;margin-top:2px}
.sF .spk-badge{background:var(--F);color:#fff}
.sM .spk-badge{background:var(--M);color:#fff}
.dl-text{flex:1}
.dl-en{font-size:.9rem;font-weight:700;color:#2d3748}
.dl-pron{font-size:.76rem;color:#718096;font-style:italic;margin-top:1px}
.dl-ko{font-size:.78rem;color:#4a5568;margin-top:2px;padding-top:2px;border-top:1px dashed #e2e8f0}
.btn-speak1{flex-shrink:0;border:1.5px solid var(--F-l);border-radius:6px;padding:3px 9px;font-size:.68rem;cursor:pointer;font-weight:700;transition:.15s;background:#fff;color:var(--F);margin-top:2px}
.btn-speak1:hover{background:var(--F-ll)}
.btn-speak1.on{background:var(--F-l);animation:pulse .9s infinite}
.sM .btn-speak1{border-color:var(--M-l);color:var(--M)}
.sM .btn-speak1:hover{background:var(--M-ll)}
.sM .btn-speak1.on{background:var(--M-l)}

/* Practice */
.prac-d{margin-top:10px;border:1.5px solid var(--green-l);border-radius:9px;overflow:hidden}
.prac-d summary{cursor:pointer;background:var(--green-ll);padding:7px 12px;font-size:.8rem;font-weight:700;color:#276749;list-style:none}
.prac-d summary::-webkit-details-marker{display:none}
.prac-list{padding:10px 14px;background:#fff;border-top:1px solid var(--green-l)}
.prac-list li{font-size:.8rem;margin-bottom:5px;padding-left:8px;border-left:3px solid #68d391;list-style:none;line-height:1.5}

.hidden{display:none!important}
@media(max-width:600px){header h1{font-size:1.3rem}.q-ko{font-size:.95rem}}
</style>
</head>
<body>

<header>
  <h1>🧒 전설의 유아 회화 150패턴</h1>
  <p>한국어로 문제 확인 → 영어로 답하기 → 듣기 연습</p>
  <div class="hbadges">
    <span class="hb">📝 한국어 질문</span>
    <span class="hb">🔊 영어 답 듣기</span>
    <span class="hb">📦 끊어읽기+발음</span>
    <span class="hb">👩 여자 / 👨 남자 목소리</span>
    <span class="hb">▶ 전체 / 한문장 듣기</span>
  </div>
</header>

<!-- Voice selector -->
<div class="voice-bar">
  <span class="vdot vF"></span>
  <label>👩 여자(A) 목소리:</label>
  <select id="selF" onchange="updateVoice('F')"></select>
  &nbsp;&nbsp;
  <span class="vdot vM"></span>
  <label>👨 남자(B) 목소리:</label>
  <select id="selM" onchange="updateVoice('M')"></select>
  <span style="font-size:.72rem;color:#a0aec0;margin-left:auto">💡 브라우저 지원 목소리 자동 탐지</span>
</div>

<div class="ctrl-bar">
  <input type="text" id="sbox" placeholder="🔍 한국어/영어 검색..." oninput="filterPats()">
  <button class="cbtn ex" onclick="expandAll()">전체 펼치기</button>
  <button class="cbtn co" onclick="collapseAll()">전체 접기</button>
  <div class="spd-wrap">
    속도:
    <button class="sbtn" onclick="setSpd(0.75,this)">0.75x</button>
    <button class="sbtn sa" onclick="setSpd(1,this)">1x</button>
    <button class="sbtn" onclick="setSpd(1.25,this)">1.25x</button>
    <button class="sbtn" onclick="setSpd(1.5,this)">1.5x</button>
  </div>
</div>

<div class="toc-w">
  <details class="toc-d">
    <summary>📋 전체 목차 (클릭)</summary>
    <div class="toc-grid" id="tocGrid"></div>
  </details>
</div>

<main id="mainArea"></main>

<script>
// ── Data: patterns with pronunciation ──
const PATS = [
  {no:"001",cat:"👋 인사하기",star:5,
   ko:"안녕! 어떻게 지내?",en:"Hi! How are you?",pron:"하이! 하우 아 유?",
   chunk:[{en:"Hi!",pron:"하이!",ko:"안녕!"},{en:"How",pron:"하우",ko:"어떻게"},{en:"are you?",pron:"아 유?",ko:"지내?"}],
   dial:[
     {g:"F",role:"친구A",en:"Hi! How are you?",pron:"하이! 하우 아 유?",ko:"안녕! 어떻게 지내?"},
     {g:"M",role:"친구B",en:"Hi! I'm fine, thank you!",pron:"하이! 아임 파인, 땡큐!",ko:"안녕! 나는 잘 지내, 고마워!"},
     {g:"F",role:"친구A",en:"Good! Let's play!",pron:"굿! 렛츠 플레이!",ko:"좋아! 같이 놀자!"}
   ],
   prac:["아침에 엄마한테: Hi, Mommy! How are you?","선생님께: Hi, teacher! How are you today?","친구에게: Hi! How are you? Let's play!"]},

  {no:"002",cat:"👋 인사하기",star:5,
   ko:"안녕하세요, 여러분!",en:"Hello, everyone!",pron:"헬로우, 에브리원!",
   chunk:[{en:"Hello,",pron:"헬로우,",ko:"안녕하세요,"},{en:"everyone!",pron:"에브리원!",ko:"여러분!"}],
   dial:[
     {g:"F",role:"선생님",en:"Hello, everyone! How are you today?",pron:"헬로우, 에브리원! 하우 아 유 투데이?",ko:"안녕하세요, 여러분! 오늘 어떻게 지내요?"},

     {g:"F",role:"선생님",en:"That's good! Let's start our class!",pron:"댓츠 굿! 렛츠 스타트 아워 클래스!",ko:"좋아요! 수업을 시작하자!"}
   ],
   prac:["유치원에서: Hello, friends! Let's play!","가게에서: Hello! Thank you!","이웃에게: Hello, Mr. Kim!"]},

  {no:"003",cat:"👋 인사하기",star:5,

   chunk:[{en:"Good morning,",pron:"굿 모닝,",ko:"좋은 아침이에요,"},{en:"Mommy!",pron:"마미!",ko:"엄마!"}],
   dial:[
     {g:"M",role:"아이",en:"Good morning, Mommy!",pron:"굿 모닝, 마미!",ko:"좋은 아침이에요, 엄마!"},
     {g:"F",role:"엄마",en:"Good morning, sweetie! Did you sleep well?",pron:"굿 모닝, 스위티! 디쥬 슬립 웰?",ko:"좋은 아침, 얘야! 잘 잤니?"},
     {g:"M",role:"아이",en:"Yes! I had a good dream!",pron:"예스! 아이 해더 굿 드림!",ko:"네! 좋은 꿈 꿨어요!"},
     {g:"F",role:"엄마",en:"That's wonderful! Let's have breakfast!",pron:"댓츠 원더풀! 렛츠 해브 브렉퍼스트!",ko:"잘됐구나! 아침 먹자!"}

  {no:"004",cat:"👋 인사하기",star:4,
   ko:"좋은 오후에요, 선생님!",en:"Good afternoon, teacher!",pron:"굿 애프터눈, 티처!",
   chunk:[{en:"Good afternoon,",pron:"굿 애프터눈,",ko:"좋은 오후에요,"},{en:"teacher!",pron:"티처!",ko:"선생님!"}],
   dial:[
     {g:"M",role:"아이",en:"Good afternoon, teacher!",pron:"굿 애프터눈, 티처!",ko:"좋은 오후에요, 선생님!"},
     {g:"F",role:"선생님",en:"Good afternoon! Are you ready to learn?",pron:"굿 애프터눈! 아 유 레디 투 런?",ko:"좋은 오후! 배울 준비 됐니?"},
     {g:"M",role:"아이",en:"Yes! I'm ready!",pron:"예스! 아임 레디!",ko:"네! 준비됐어요!"},

   ],
   prac:["유치원에서: Good afternoon, everyone!","이웃에게: Good afternoon, Mrs. Kim!","가게에서: Good afternoon! Can I have this?"]},

  {no:"005",cat:"👋 인사하기",star:5,
   ko:"잘 자요! 푹 자요!",en:"Good night! Sleep well!",pron:"굿 나잇! 슬립 웰!",
   chunk:[{en:"Good night,",pron:"굿 나잇,",ko:"잘 자요,"},{en:"sleep well!",pron:"슬립 웰!",ko:"푹 자요!"}],
   dial:[

   chunk:[{en:"Nice",pron:"나이스",ko:"좋아"},{en:"to meet",pron:"투 밋",ko:"만나서"},{en:"you!",pron:"유!",ko:"반가워!"}],
   dial:[
     {g:"M",role:"아이A",en:"Hi! I'm Tom. What's your name?",pron:"하이! 아임 톰. 왓츠 유어 네임?",ko:"안녕! 나는 톰이야. 너의 이름은 뭐야?"},
     {g:"F",role:"아이B",en:"I'm Jenny. Nice to meet you!",pron:"아임 제니. 나이스 투 밋 유!",ko:"나는 제니야. 만나서 반가워!"},

   ],
   prac:["새 친구: Hi! I'm [이름]. Nice to meet you!","선생님께: Good morning! I'm [이름]. Nice to meet you!","친구 부모님께: Hello! Nice to meet you!"]},

  {no:"007",cat:"👋 인사하기",star:5,
   ko:"고마워요!",en:"Thank you so much!",pron:"땡큐 소우 머치!",

// ── Voice management ──
let voices=[], voiceF=null, voiceM=null, globalSpd=1, curUtter=null, curPlayAll=null;

function loadVoices(){
  voices=speechSynthesis.getVoices();
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  populateSel('selF', enV, ['Samantha','Victoria','Karen','Moira','Zira','Female','female','Google UK English Female','en-GB']);
  populateSel('selM', enV, ['Daniel','Alex','Tom','Fred','David','Male','male','Google UK English Male','en-US']);
  autoSelect();
}
speechSynthesis.onvoiceschanged=loadVoices;
window.addEventListener('load', ()=>{setTimeout(loadVoices,300)});

function populateSel(id, enV, prefer){
  const sel=document.getElementById(id); sel.innerHTML='';
  enV.forEach((v,i)=>{const o=document.createElement('option');o.value=i;o.textContent=v.name+' ('+v.lang+')';sel.appendChild(o)});
}
function autoSelect(){
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  const fKeys=['Samantha','Victoria','Karen','Moira','Zira','female','Female','Google UK English Female'];
  const mKeys=['Daniel','Alex','Tom','Fred','David','male','Male','Google UK English Male'];
  let fi=enV.findIndex(v=>fKeys.some(k=>v.name.includes(k)));
  let mi=enV.findIndex(v=>mKeys.some(k=>v.name.includes(k))&&v!==enV[fi]);
  if(fi<0)fi=0;if(mi<0)mi=Math.min(1,enV.length-1);
  document.getElementById('selF').value=fi;
  document.getElementById('selM').value=mi;
  voiceF=enV[fi]||null; voiceM=enV[mi]||null;
}
function updateVoice(g){
  const enV=voices.filter(v=>v.lang.startsWith('en'));
  if(g==='F') voiceF=enV[document.getElementById('selF').value]||null;
  else voiceM=enV[document.getElementById('selM').value]||null;
}
function getVoice(g){ return g==='F'?(voiceF||null):(voiceM||null); }

function speakText(text, gender, btn){
  if(curUtter){speechSynthesis.cancel();curUtter=null;}
  if(btn){btn.classList.add('on');btn.textContent=btn.textContent.replace('🔊','⏸');}
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=globalSpd;
  const v=getVoice(gender);if(v)u.voice=v;
  u.onend=()=>{if(btn){btn.classList.remove('on');btn.textContent=btn.textContent.replace('⏸','🔊');}curUtter=null;};
  u.onerror=()=>{if(btn){btn.classList.remove('on');btn.textContent=btn.textContent.replace('⏸','🔊');}curUtter=null;};
  curUtter=u; speechSynthesis.speak(u);
}

function playAll(btn, patNo){
  if(btn.classList.contains('ps-on')){
    speechSynthesis.cancel();if(curPlayAll)clearTimeout(curPlayAll);
    btn.classList.remove('ps-on');btn.textContent='▶ 전체 듣기';
    document.querySelectorAll('#pw-'+patNo+' .dl').forEach(l=>l.classList.remove('spk'));
    const prog=document.getElementById('pp-'+patNo);if(prog)prog.classList.remove('on');return;
  }
  const wrap=document.getElementById('pw-'+patNo);
  if(!wrap.querySelector('.pd[open]'))wrap.querySelector('.pd').setAttribute('open','');
  const lines=wrap.querySelectorAll('.dl');
  const prog=document.getElementById('pp-'+patNo);
  const sl=wrap.querySelector('.intv-sl');
  const interval=parseFloat(sl?sl.value:1.5)*1000;
  btn.classList.add('ps-on');btn.textContent='⏹ 정지';
  let idx=0;
  const next=()=>{
    if(idx>=lines.length){btn.classList.remove('ps-on');btn.textContent='▶ 전체 듣기';lines.forEach(l=>l.classList.remove('spk'));if(prog)prog.classList.remove('on');return;}
    lines.forEach(l=>l.classList.remove('spk'));lines[idx].classList.add('spk');
    if(prog){prog.textContent=`${idx+1}/${lines.length}`;prog.classList.add('on');}
    lines[idx].scrollIntoView({behavior:'smooth',block:'nearest'});
    const en=lines[idx].querySelector('.dl-en').textContent;
    const g=lines[idx].dataset.g||'F';
    const u=new SpeechSynthesisUtterance(en);
    u.lang='en-US';u.rate=globalSpd;const v=getVoice(g);if(v)u.voice=v;
    u.onend=()=>{idx++;curPlayAll=setTimeout(next,interval);};
    u.onerror=()=>{idx++;curPlayAll=setTimeout(next,interval);};
    speechSynthesis.speak(u);
  };next();
}

// ── Build ──
function buildTOC(){
  const grid=document.getElementById('tocGrid');
  const cats={};PATS.forEach(p=>{if(!cats[p.cat])cats[p.cat]=[];cats[p.cat].push(p);});
  Object.keys(cats).forEach(cat=>{
    const lbl=document.createElement('div');lbl.style.cssText='grid-column:1/-1;font-weight:700;font-size:.78rem;color:#667eea;padding:4px 2px;margin-top:6px;border-bottom:1px solid #e2e8f0;';lbl.textContent=cat;grid.appendChild(lbl);
    cats[cat].forEach(p=>{const a=document.createElement('a');a.className='toc-a';a.href='#pw-'+p.no;a.innerHTML=`<span class="toc-n">${p.no}</span><span>${p.ko}</span>`;grid.appendChild(a);});
  });
}

function buildPats(){
  const main=document.getElementById('mainArea');let lastCat='';
  PATS.forEach(p=>{
    if(p.cat!==lastCat){const h=document.createElement('div');h.className='cat-hdr';h.textContent=p.cat;main.appendChild(h);lastCat=p.cat;}
    const w=document.createElement('div');w.className='pw';w.id='pw-'+p.no;w.dataset.ko=p.ko;w.dataset.en=p.en.toLowerCase();
    w.innerHTML=makeHTML(p);main.appendChild(w);
  });
}

function makeHTML(p){
  const chunkItems=p.chunk.map(c=>`<div class="chunk-item"><div class="c-en">${c.en}</div><div class="c-pron">${c.pron}</div><div class="c-ko">${c.ko}</div></div>`).join('');
  const dlines=p.dial.map((d,i)=>`
    <div class="dl s${d.g}" id="dl-${p.no}-${i}" data-g="${d.g}">
      <div class="spk-badge">${d.g==='F'?'👩 A':'👨 B'}<br><span style="font-size:.6rem;opacity:.8">${d.role}</span></div>
      <div class="dl-text">
        <div class="dl-en">${d.en}</div>
        <div class="dl-pron">🔤 ${d.pron}</div>
        <div class="dl-ko">🇰🇷 ${d.ko}</div>
      </div>
      <button class="btn-speak1" onclick="speakText('${escQ(d.en)}','${d.g}',this)">🔊 듣기</button>
    </div>`).join('');
  const prac=p.prac.map(r=>`<li>${r}</li>`).join('');
  return `
  <details class="pd">
    <summary class="ps">
      <span class="pnum">${p.no}</span>
      <div style="flex:1">
        <div class="q-ko">${p.ko}</div>
        <div class="q-cat">${p.cat} &nbsp;·&nbsp; 영어 답 클릭해서 확인</div>
      </div>
      <span class="star">${'⭐'.repeat(p.star)}</span>
    </summary>
    <div class="pb">
      <!-- English answer -->
      <div class="ans-en-box">
        <div class="ans-en-text">
          <div class="ans-en-main">💬 ${p.en}</div>
          <div class="ans-pron">🔤 발음: ${p.pron}</div>
        </div>
        <button class="btn-ans-speak" onclick="speakText('${escQ(p.en)}','F',this)">🔊 답 듣기</button>
      </div>
      <!-- Chunk -->
      <div class="chunk-box">
        <div class="chunk-label">📦 끊어읽기 (청크) — 영어 / 발음 / 한국어</div>
        <div class="chunk-row">${chunkItems}</div>
      </div>
      <!-- Dialogue -->
      <div class="dial-hdr">
        <span class="dial-title">💬 실전 대화 &nbsp;<span style="font-size:.72rem;color:#a0aec0">👩=여자 👨=남자 목소리</span></span>
        <button class="btn-play-all" onclick="playAll(this,'${p.no}')">▶ 전체 듣기</button>
      </div>
      <div class="play-ctrl">
        <div class="intv-wrap">간격<input type="range" class="intv-sl" min=".5" max="3" step=".5" value="1.5" oninput="this.nextElementSibling.textContent=this.value+'s'"><span class="intv-val">1.5s</span></div>
        <div style="width:1px;height:16px;background:var(--green-l)"></div>
        <div class="spd-wrap">속도
          <button class="sbtn" onclick="setLSpd(this,.75)">0.75x</button>
          <button class="sbtn sa" onclick="setLSpd(this,1)">1x</button>
          <button class="sbtn" onclick="setLSpd(this,1.25)">1.25x</button>
        </div>
        <span class="play-prog" id="pp-${p.no}">0/${p.dial.length}</span>
      </div>
      ${dlines}
      <details class="prac-d"><summary>🎯 응용 연습</summary><ul class="prac-list">${prac}</ul></details>
    </div>
  </details>`;
}

function escQ(s){return s.replace(/'/g,"\\'")}
function setSpd(v,btn){globalSpd=v;document.querySelectorAll('.ctrl-bar .sbtn').forEach(b=>b.classList.remove('sa'));btn.classList.add('sa');}
function setLSpd(btn,v){globalSpd=v;btn.closest('.play-ctrl').querySelectorAll('.sbtn').forEach(b=>b.classList.remove('sa'));btn.classList.add('sa');}
function expandAll(){document.querySelectorAll('.pd').forEach(d=>d.setAttribute('open',''));}
function collapseAll(){document.querySelectorAll('.pd').forEach(d=>d.removeAttribute('open'));}
function filterPats(){
  const q=document.getElementById('sbox').value.toLowerCase();
  document.querySelectorAll('.pw').forEach(w=>{w.classList.toggle('hidden',!(!q||w.dataset.ko.includes(q)||w.dataset.en.includes(q)));});
  document.querySelectorAll('.cat-hdr').forEach(h=>{
    let s=h.nextElementSibling,has=false;
    while(s&&!s.classList.contains('cat-hdr')){if(!s.classList.contains('hidden'))has=true;s=s.nextElementSibling;}
    h.classList.toggle('hidden',!has);
  });
}
buildTOC();buildPats();
</script>
</body>
</html>
